# Secrets (Dashboard or CLI):
#   supabase secrets set BREVO_API_KEY=... BREVO_TEMPLATE_ID_WELCOME=54 \
#     LIFECYCLE_SENDER_EMAIL=... LIFECYCLE_SENDER_NAME="Adam from Oasis"

[functions.lifecycle-send]
