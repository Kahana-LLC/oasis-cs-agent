<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oasis Email Machine — Project Charter</title>
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <div class="wrap" id="app">
    <p class="err">Loading email machine reference…</p>
  </div>
  <script>
    let emailData = null;
    let snapshotData = null;
    let bucketCounts = {};
    let copyManifest = {};

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function providerById(id) {
      return (emailData?.providers || []).find((p) => p.id === id);
    }

    function formatLimits(p) {
      if (!p?.free_limits) return "—";
      const lim = p.free_limits;
      const parts = [];
      if (lim.marketing_emails_per_month != null) {
        parts.push(`${lim.marketing_emails_per_month.toLocaleString()}/mo marketing`);
      }
      if (lim.emails_per_day != null) {
        parts.push(`${lim.emails_per_day}/day`);
      }
      if (lim.emails_per_month != null) {
        parts.push(`${lim.emails_per_month.toLocaleString()}/mo`);
      }
      if (lim.contacts != null) {
        parts.push(`${lim.contacts.toLocaleString()} contacts`);
      }
      return parts.join(" · ") || "—";
    }

    function bucketLabel(key) {
      const b = (emailData?.buckets || []).find((x) => x.key === key);
      if (b) return b.label;
      const p = (emailData?.pseudo_buckets || []).find((x) => x.key === key);
      return p ? p.label : key;
    }

    function bucketPills(keys) {
      return (keys || [])
        .map(
          (k) =>
            `<span class="bucket-pill bucket-${escapeHtml(k)}">${escapeHtml(bucketLabel(k))}</span>`
        )
        .join("");
    }

    function phaseBadge(phase) {
      if (phase === "1-adam") {
        return '<span class="phase-badge phase-adam">Adam</span>';
      }
      if (phase === "1-new") {
        return '<span class="phase-badge phase-new">New</span>';
      }
      return "";
    }

    function liveCountForBucket(key) {
      if (bucketCounts[key] == null) return "";
      return `<span class="live-count">${bucketCounts[key]} users</span>`;
    }

    function metricLinks(seq) {
      const anchors = seq.dashboard_anchors || [];
      const metrics = seq.dashboard_metrics || [];
      const links = anchors.map(
        (a) => `<a class="metric-link" href="/#${escapeHtml(a)}">#${escapeHtml(a)}</a>`
      );
      metrics.slice(0, 3).forEach((m) => {
        links.push(`<span class="code">${escapeHtml(m)}</span>`);
      });
      return links.join(" ") || "—";
    }

    function getPreview(seq) {
      return seq?.preview && typeof seq.preview === "object" ? seq.preview : null;
    }

    function getPreviewPath(seq) {
      const p = getPreview(seq);
      return p?.path || seq.preview_path || null;
    }

    function inferImplementationStatus(seq) {
      if (seq.implementation_status) return seq.implementation_status;
      return "needs_implementation";
    }

    function implementationStatusBadge(seq) {
      const status = inferImplementationStatus(seq);
      const cls =
        status === "shipped"
          ? "status-shipped"
          : status === "needs_implementation"
            ? "status-needs-implementation"
            : "status-planned";
      return `<span class="status-pill ${cls}">${escapeHtml(status.replace(/_/g, " "))}</span>`;
    }

    const CADENCE_LABELS = {
      "one-time": "One-time send",
      "drip-2-4": "Drip (2–4 touches)",
      "one-time-plus-d7": "One-time + D7 reminder",
      "campaign-2-touch": "2-touch campaign",
      "one-time-plus-d14": "One-time + D14 follow-up",
    };

    function cadenceLabel(cadence) {
      return CADENCE_LABELS[cadence] || cadence || "—";
    }

    function providerCell(seq) {
      let html = strategyProviderCell(seq);
      if (seq.deployed_via && seq.deployed_via !== seq.provider_id) {
        const shipped = providerById(seq.deployed_via);
        html += `<br><span class="section-cap">Brevo interim: ${escapeHtml(shipped?.name || seq.deployed_via)}</span>`;
      }
      return html;
    }

    function requirementsCell(seq) {
      const cadence = cadenceLabel(seq.cadence);
      return `<div class="requirements-cell">
        <div class="requirements-plain">
          <strong>Audience:</strong> ${bucketPills(seq.buckets)}<br>
          <strong>Frequency:</strong> ${escapeHtml(cadence)}<br>
          <strong>When:</strong> ${escapeHtml(seq.trigger_when || "—")}<br>
          ${escapeHtml(seq.trigger_summary || "")}
        </div>
        <div class="requirements-tech">
          <span class="code">${escapeHtml(seq.trigger_implementation || "")}</span><br>
          <span class="code">dedup: ${escapeHtml(seq.dedup_trigger_name || "")}</span> · outreach_log
        </div>
      </div>`;
    }

    function strategyProviderCell(seq) {
      const primary = providerById(seq.provider_id);
      const overflow = seq.provider_overflow_id ? providerById(seq.provider_overflow_id) : null;
      if (overflow) {
        return `${escapeHtml(primary?.name || seq.provider_id)} <span class="section-cap">→ ${escapeHtml(overflow.name)}</span>`;
      }
      return escapeHtml(primary?.name || seq.provider_id);
    }

    function capacityForProvider(id) {
      return (snapshotData?.email_provider_capacity?.providers || []).find((p) => p.id === id);
    }

    function providerStatusClass(id) {
      const cap = capacityForProvider(id);
      if (!cap) return "";
      return cap.status === "at_limit" ? "provider-at-limit" : cap.status === "near_limit" ? "provider-near-limit" : "";
    }

    async function copyToClipboard(text, btn) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        if (btn) {
          const prev = btn.textContent;
          btn.textContent = "Copied";
          btn.classList.add("toast-copied");
          setTimeout(() => {
            btn.textContent = prev;
            btn.classList.remove("toast-copied");
          }, 1500);
        }
      } catch {
        alert("Copy failed — select text manually.");
      }
    }

    function copyButtonsHtml(seqId) {
      const entry = copyManifest[seqId];
      if (!entry) {
        return `<span class="section-cap">Run build to generate copy manifest</span>`;
      }
      const plainBtn = entry.plain_text
        ? `<button type="button" class="copy-btn" data-copy-kind="plain" data-seq="${escapeHtml(seqId)}">Copy plain text</button>`
        : "";
      return `<div class="copy-btn-row">
        <button type="button" class="copy-btn" data-copy-kind="html" data-seq="${escapeHtml(seqId)}">Copy HTML</button>
        ${plainBtn}
      </div>`;
    }

    function bindCopyButtons() {
      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const seqId = btn.getAttribute("data-seq");
          const kind = btn.getAttribute("data-copy-kind");
          const entry = copyManifest[seqId];
          if (!entry) return;
          const text = kind === "plain" ? entry.plain_text : entry.html;
          copyToClipboard(text, btn);
        });
      });
    }

    function providerStatusPill(id) {
      const cap = capacityForProvider(id);
      if (!cap) return "";
      return `<span class="status-pill status-${cap.status}">${escapeHtml(cap.status.replace("_", " "))}</span>`;
    }

    function previewIframe(path, title) {
      return `<div class="preview-iframe-wrap"><iframe src="${escapeHtml(path)}" title="${escapeHtml(title)} preview" sandbox=""></iframe></div>`;
    }

    function previewCell(seq) {
      const preview = getPreview(seq);
      const path = getPreviewPath(seq);
      if (!path) {
        return `<details class="email-preview preview-slot">
          <summary>Preview</summary>
          <div class="preview-body">Template not yet in <span class="code">brevo-oasis-emails/</span>. Add source HTML and <span class="code">preview.source</span> in email_sequences.json, then run build.</div>
        </details>`;
      }
      const subject = preview?.subject ? escapeHtml(preview.subject) : "Preview";
      return `<details class="email-preview preview-slot">
        <summary>${subject}</summary>
        ${copyButtonsHtml(seq.id)}
        ${previewIframe(path, seq.name)}
      </details>`;
    }

    function renderPreviewGallery() {
      const withPreview = (emailData?.sequences || []).filter((s) => getPreviewPath(s));
      if (!withPreview.length) return "";
      const repoBase = "https://github.com/AdamKershner/oasis-analytics/blob/main/";
      const cards = withPreview
        .map((seq) => {
          const preview = getPreview(seq);
          const path = getPreviewPath(seq);
          const sourceLink = preview?.source
            ? `<a href="${repoBase}${escapeHtml(preview.source)}" target="_blank" rel="noopener">Source file</a>`
            : "";
          return `<article class="preview-card" id="preview-${escapeHtml(seq.id)}">
            <div class="preview-meta">
              <h3>${escapeHtml(seq.name)}${phaseBadge(seq.phase)} ${implementationStatusBadge(seq)}</h3>
              <p class="preview-subject">${escapeHtml(preview?.subject || "")}</p>
              <p class="preview-preheader">${escapeHtml(preview?.preheader || "")}</p>
              <p class="preview-from">${escapeHtml(preview?.from_name || "")} · ${escapeHtml(seq.trigger_when || "")}</p>
              <p>${bucketPills(seq.buckets)}</p>
            </div>
            <details class="email-preview">
              <summary>Open full preview</summary>
              ${copyButtonsHtml(seq.id)}
              ${previewIframe(path, seq.name)}
            </details>
            <p class="preview-source">${sourceLink}</p>
          </article>`;
        })
        .join("");
      return `<section id="preview-gallery">
        <h2>Email previews</h2>
        <p class="section-cap">Rendered from <span class="code">brevo-oasis-emails/</span> (built to <span class="code">public/emails/</span> on deploy). Merge tags show sample values (e.g. Alex).</p>
        <div class="preview-gallery">${cards}</div>
      </section>`;
    }

    function renderProviders() {
      const seqs = emailData?.sequences || [];
      return (emailData?.providers || [])
        .map((p) => {
          const used = seqs
            .filter((s) => s.provider_id === p.id || s.provider_overflow_id === p.id)
            .map((s) => s.name);
          const nameHtml = p.pricing_url
            ? `<a href="${escapeHtml(p.pricing_url)}" target="_blank" rel="noopener">${escapeHtml(p.name)}</a>`
            : escapeHtml(p.name);
          return `<div class="provider-card ${providerStatusClass(p.id)}" data-provider-id="${escapeHtml(p.id)}">
            <h3>${nameHtml} ${providerStatusPill(p.id)}</h3>
            <div class="limits">${escapeHtml(formatLimits(p))}</div>
            <div class="constraints">${(p.constraints || []).map(escapeHtml).join(" · ")}</div>
            <div class="upgrade"><strong>Upgrade when:</strong> ${escapeHtml(p.upgrade_trigger || "—")}</div>
            ${p.notes ? `<div class="upgrade">${escapeHtml(p.notes)}</div>` : ""}
            <div class="seq-list">Sequences: ${used.length ? escapeHtml(used.join(", ")) : "—"}</div>
          </div>`;
        })
        .join("");
    }

    function renderBucketsTable() {
      const seqs = emailData?.sequences || [];
      const rows = (emailData?.buckets || [])
        .map((b) => {
          const related = seqs
            .filter((s) => (s.buckets || []).includes(b.key))
            .map((s) => s.name)
            .join(", ");
          return `<tr data-bucket="${escapeHtml(b.key)}">
            <td><span class="bucket-pill bucket-${escapeHtml(b.key)}">${escapeHtml(b.label)}</span>${liveCountForBucket(b.key)}</td>
            <td>${escapeHtml(b.definition)}</td>
            <td>${escapeHtml(b.rollup || "")}</td>
            <td class="flow-rates">${(b.flow_rates || []).map((r) => `<span class="code">${escapeHtml(r)}</span>`).join(" ")}</td>
            <td>${escapeHtml(related || "—")}</td>
          </tr>`;
        })
        .join("");
      return `<table class="bucket-table">
        <thead><tr><th>Bucket</th><th>Definition</th><th>Roll-up</th><th>Flow rates</th><th>Sequences</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function renderProviderCapacity() {
      const cap = snapshotData?.email_provider_capacity;
      const providers = cap?.providers || [];
      if (!providers.length) {
        return `<section id="provider-capacity">
          <h2>Provider capacity</h2>
          <p class="section-cap">Near-limit tracking requires live snapshot. Open on Vercel or run <span class="code">vercel dev</span>.</p>
        </section>`;
      }
      const alert = cap.any_near_limit
        ? `<div class="banner banner-warn">${(providers.flatMap((p) => p.near_limit_errors || [])).map((e) => escapeHtml(e.message)).join(" · ")}</div>`
        : `<div class="banner banner-live">All providers within free-tier headroom (80% threshold).</div>`;
      const rows = providers
        .map((p) => {
          const contact = (p.metrics || []).find((m) => m.key === "contacts");
          const monthly = (p.metrics || []).find((m) => m.key === "sends_monthly");
          const daily = (p.metrics || []).find((m) => m.key === "sends_daily");
          const fmt = (m) => (m ? `${m.used.toLocaleString()} / ${m.limit.toLocaleString()} (${Math.round(100 * m.pct)}%)` : "—");
          return `<tr class="${providerStatusClass(p.id)}">
            <td><strong>${escapeHtml(p.name)}</strong> ${providerStatusPill(p.id)}</td>
            <td>${fmt(contact)}</td>
            <td>${fmt(monthly)}</td>
            <td>${fmt(daily)}</td>
            <td>${p.runway_months != null ? `${p.runway_months} mo` : "—"}</td>
            <td>${escapeHtml(p.status.replace("_", " "))}</td>
          </tr>`;
        })
        .join("");
      return `<section id="provider-capacity">
        <h2>Provider capacity &amp; near-limit</h2>
        <p class="section-cap">${escapeHtml(cap.estimation_note || "")} · <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/docs/USER_EMAIL_MACHINE_PROPOSAL.md#6-capacity-runway-and-upgrade-triggers">Proposal §6</a></p>
        ${alert}
        <table class="capacity-table">
          <thead><tr><th>Provider</th><th>Contacts</th><th>Sends (mo)</th><th>Sends (day)</th><th>Runway</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </section>`;
    }

    const CADENCE_SENDS = {
      "one-time": 1,
      "drip-2-4": 3,
      "one-time-plus-d7": 2,
      "campaign-2-touch": 2,
      "one-time-plus-d14": 2,
    };

    function getBaselineState() {
      const dau = snapshotData?.dau_model || {};
      return {
        totalUsers: snapshotData?.total_users || 122,
        bucketCounts: { ...(dau.bucket_counts || { new: 0, current: 0, reactivated: 0, resurrected: 1, at_risk_wau: 16, at_risk_mau: 10, dead: 95 }) },
        monetization: { ...(snapshotData?.monetization || { paid_subscribers: 1, users_hit_limit: 1, cancelled_paid_subscribers: 0 }) },
      };
    }

    function projectBucketsForSim(totalUsers, newMonthly) {
      const dau = Math.max(1, Math.round(totalUsers * 0.08));
      const atRiskWau = Math.max(1, Math.round(dau * 0.94));
      const atRiskMau = Math.max(1, Math.round(totalUsers * 0.08));
      const dead = Math.max(0, totalUsers - dau - atRiskWau - atRiskMau - 2);
      return {
        new: Math.min(Math.max(1, Math.floor(newMonthly / 30)), 5),
        current: Math.max(0, dau - 2),
        reactivated: 1,
        resurrected: 1,
        at_risk_wau: atRiskWau,
        at_risk_mau: atRiskMau,
        dead,
      };
    }

    function seqEligible(seq, ctx) {
      const cadence = CADENCE_SENDS[seq.cadence || "one-time"] || 1;
      let eligible = 0;
      for (const b of seq.buckets || []) {
        if (b in ctx.bucketCounts) eligible += ctx.bucketCounts[b];
        else if (b === "paid") eligible += ctx.paidSubs;
        else if (b === "limit_hitter") eligible += ctx.limitHitters;
        else if (b === "cancelled_paid") eligible += ctx.cancelledPaid;
        else if (b === "waitlist") eligible += ctx.launchAudience;
      }
      const signupVol = ctx.signupVol;
      if (seq.id === "welcome" || seq.id === "nps_day3") eligible = signupVol;
      else if (seq.id === "pmf_day10") eligible = Math.round(signupVol * ctx.pmfPct);
      else if (seq.id === "activation_nudge") eligible = Math.round(signupVol * (1 - ctx.activationPct));
      else if (seq.id === "dead_resurrection") eligible = Math.min(ctx.bucketCounts.dead || 0, ctx.deadCap);
      else if (seq.id === "ph_teaser" || seq.id === "ph_launch") {
        eligible = ctx.mode === "launch_week" ? ctx.launchAudience : 0;
      }
      return { sends: eligible * cadence, eligible };
    }

    function providerContactsSim(pid, ctx, byProvider) {
      const signupVol = ctx.signupVol;
      if (pid === "omnisend") {
        return ctx.activeRules.includes("omnisend_to_brevo") ? 0 : ctx.paidSubs;
      }
      if (pid === "hubspot") {
        const usesHubspot = ctx.activeRules.includes("ph_week_brevo_primary") ? 0 : signupVol;
        return usesHubspot;
      }
      if (pid === "mailgun") return Math.round(signupVol * ctx.pmfPct);
      if (pid === "emailoctopus") {
        const ar = (ctx.bucketCounts.at_risk_wau || 0) + (ctx.bucketCounts.at_risk_mau || 0);
        const dead = Math.min(ctx.bucketCounts.dead || 0, ctx.deadCap);
        const ret = (ctx.bucketCounts.reactivated || 0) + (ctx.bucketCounts.resurrected || 0);
        return ar + dead + ret;
      }
      if (pid === "mailerlite") {
        const eoCap = providerById("emailoctopus")?.free_limits?.contacts || 2500;
        const eoUsed = providerContactsSim("emailoctopus", ctx, byProvider);
        if (eoUsed > eoCap * 0.8) return Math.min(500, Math.round((eoUsed - eoCap * 0.8) * 0.5));
        return 0;
      }
      if (pid === "brevo") {
        let base = signupVol + ctx.limitHitters + ctx.cancelledPaid + ctx.paidSubs;
        if (ctx.mode === "launch_week") base += ctx.launchAudience;
        base += signupVol + Math.round(signupVol * ctx.pmfPct);
        return Math.min(ctx.totalUsers, base);
      }
      return ctx.totalUsers;
    }

    function computeDailyPeaks(ctx) {
      const { newUsersDay, newUsersMonth, mode, launchAudience, launchDays, activationPct, pmfPct, agentReserve, activeRules } = ctx;
      const npsDailyPeak = Math.round((newUsersMonth / 30) * 1.5);
      const launchBrevo = mode === "launch_week" ? launchAudience / 2 / launchDays : 0;
      const peaks = {};
      peaks.brevo =
        newUsersDay +
        Math.round(newUsersDay * (1 - activationPct)) +
        npsDailyPeak +
        launchBrevo +
        agentReserve;
      peaks.mailgun = Math.max(Math.round((newUsersMonth * pmfPct) / 30), Math.round(newUsersDay * pmfPct / 5));
      peaks.hubspot = activeRules.includes("ph_week_brevo_primary")
        ? 0
        : newUsersDay + Math.round(newUsersDay * (1 - activationPct));
      return peaks;
    }

    function simulateCapacity(opts) {
      const lc = emailData?.launch_config || {};
      const newUsersDay = opts.newUsersPerDayMax ?? lc.default_new_users_per_day_max ?? 7;
      const newUsersMonth = opts.newUsersPerMonthMax ?? lc.default_new_users_per_month_max ?? 200;
      const mode = opts.mode || "launch_week";
      const baseline = getBaselineState();
      const launchAudience = lc.launch_brevo_audience ?? 222;
      const launchDays = lc.launch_window_days ?? 3;
      const activationPct = lc.activation_24h_pct ?? 0.32;
      const pmfPct = lc.pmf_wau_eligible_pct ?? 0.40;
      const paidConversion = lc.paid_conversion_pct ?? 0.015;
      const agentReserve = lc.agent_brevo_daily_reserve ?? 50;

      const signupVol = newUsersMonth;
      const totalUsers = baseline.totalUsers + newUsersMonth;
      const autoPaid = Math.max(baseline.monetization.paid_subscribers || 0, Math.round(totalUsers * paidConversion));
      const paidSubs = opts.paidOverride != null ? opts.paidOverride : autoPaid;
      const bucketCounts = projectBucketsForSim(totalUsers, newUsersMonth);
      const rateInconsistent = newUsersDay * 30 > newUsersMonth && newUsersMonth > 0;

      let deadCap = 20;
      const activeRules = [];
      if (mode === "launch_week" || newUsersMonth >= 1) activeRules.push("ph_week_brevo_primary");
      if (paidSubs >= 1) activeRules.push("omnisend_to_brevo");

      const ctx = {
        newUsersDay,
        newUsersMonth,
        mode,
        signupVol,
        totalUsers,
        paidSubs,
        limitHitters: Math.max(baseline.monetization.users_hit_limit || 0, Math.round(newUsersMonth * 0.05)),
        cancelledPaid: baseline.monetization.cancelled_paid_subscribers || 0,
        bucketCounts,
        launchAudience,
        launchDays,
        activationPct,
        pmfPct,
        deadCap,
        activeRules,
        agentReserve,
      };

      const eoContacts = providerContactsSim("emailoctopus", ctx, {});
      if (eoContacts > 2000) {
        activeRules.push("emailoctopus_cap");
        ctx.deadCap = 10;
      }
      ctx.activeRules = activeRules;

      function effectiveProvider(seq) {
        let pid = seq.provider_id;
        if (activeRules.includes("ph_week_brevo_primary") && ["welcome", "activation_nudge"].includes(seq.id)) {
          pid = "brevo";
        }
        if (activeRules.includes("omnisend_to_brevo") && ["upgrade_thank_you", "cancelled_winback"].includes(seq.id)) {
          pid = "brevo";
        }
        return pid;
      }

      const byProvider = {};
      for (const seq of emailData?.sequences || []) {
        const { sends } = seqEligible(seq, ctx);
        if (sends <= 0) continue;
        let pid = effectiveProvider(seq);
        byProvider[pid] = (byProvider[pid] || 0) + sends;
        if (seq.provider_overflow_id && newUsersMonth >= 600) {
          byProvider[seq.provider_overflow_id] = (byProvider[seq.provider_overflow_id] || 0) + sends * 0.15;
        }
      }

      const dailyPeaks = computeDailyPeaks(ctx);
      if (dailyPeaks.brevo > 240) {
        activeRules.push("brevo_daily_overflow");
        const pmfSeq = (emailData?.sequences || []).find((s) => s.id === "pmf_day10");
        if (pmfSeq) {
          const { sends: pmfSends } = seqEligible(pmfSeq, ctx);
          byProvider.brevo = Math.max(0, (byProvider.brevo || 0) - pmfSends);
          byProvider.mailgun = (byProvider.mailgun || 0) + pmfSends;
        }
      }
      ctx.activeRules = activeRules;

      const brevoProv = providerById("brevo");
      const brevoFree = brevoProv?.free_limits || {};
      const brevoStarterLimits = brevoProv?.paid_tier?.limits || null;
      const brevoContactsEst = providerContactsSim("brevo", ctx, byProvider);
      const useBrevoStarter =
        paidSubs >= 1 ||
        dailyPeaks.brevo > (brevoFree.emails_per_day ?? Infinity) ||
        brevoContactsEst > (brevoFree.contacts ?? Infinity);

      const providerRows = [];
      const failures = [];
      const priority = { launch_peak: 0, daily: 1, monthly: 2, contacts: 3 };

      for (const prov of emailData?.providers || []) {
        const pid = prov.id;
        const lim =
          pid === "brevo" && useBrevoStarter && brevoStarterLimits
            ? { ...brevoStarterLimits }
            : { ...(prov.free_limits || {}) };
        const monthly = byProvider[pid] || 0;
        const dailyAvg = monthly / 30;
        const contacts = providerContactsSim(pid, ctx, byProvider);
        const metrics = [];

        const moLim = lim.marketing_emails_per_month ?? lim.emails_per_month;
        if (moLim != null) {
          const pct = monthly / moLim;
          metrics.push({ key: "monthly", label: "Sends/mo", used: monthly, limit: moLim, pct });
          if (pct >= 1) failures.push({ pid, type: "monthly", used: monthly, limit: moLim, name: prov.name });
        }
        const dayLim = lim.emails_per_day;
        if (dayLim != null) {
          const peak = dailyPeaks[pid] ?? dailyAvg;
          const usePeak = dailyPeaks[pid] != null && dailyPeaks[pid] > dailyAvg;
          const dailyUsed = usePeak ? peak : dailyAvg;
          const pct = dailyUsed / dayLim;
          metrics.push({
            key: usePeak ? "launch_peak" : "daily",
            label: usePeak ? "Peak day" : "Sends/day avg",
            used: dailyUsed,
            limit: dayLim,
            pct,
          });
          if (pct >= 1) {
            failures.push({
              pid,
              type: usePeak ? "launch_peak" : "daily",
              used: dailyUsed,
              limit: dayLim,
              name: prov.name,
            });
          }
        }
        if (lim.contacts != null) {
          const pct = contacts / lim.contacts;
          metrics.push({ key: "contacts", label: "Contacts", used: contacts, limit: lim.contacts, pct });
          if (pct >= 1) failures.push({ pid, type: "contacts", used: contacts, limit: lim.contacts, name: prov.name });
        }

        const worst = metrics.reduce((a, m) => (!a || m.pct > a.pct ? m : a), null);
        const worstPct = worst ? worst.pct : 0;
        const status = worstPct >= 1 ? "at_limit" : worstPct >= 0.8 ? "near_limit" : "ok";

        providerRows.push({
          id: pid,
          name: prov.name,
          monthly,
          contacts,
          metrics,
          worst,
          status,
          barLabel: worst ? `${worst.label}: ${Math.round(worst.used).toLocaleString()} / ${worst.limit.toLocaleString()}` : "—",
        });
      }

      failures.sort((a, b) => {
        const pa = priority[a.type] ?? 9;
        const pb = priority[b.type] ?? 9;
        return pa !== pb ? pa - pb : b.used / b.limit - a.used / a.limit;
      });

      const triggeredCliffs = [];
      for (const cliff of emailData?.capacity_cliffs || []) {
        const row = providerRows.find((p) => p.id === cliff.provider_id);
        if (!row) continue;
        let fire = false;
        if (cliff.id === "brevo_launch_peak") {
          fire = dailyPeaks.brevo > 240;
        } else if (cliff.id === "brevo_contacts") {
          fire = (providerRows.find((p) => p.id === "brevo")?.contacts || 0) > 1600;
        } else if (cliff.id === "hubspot_defer_ph") {
          fire = mode === "launch_week" || newUsersMonth > 400 || newUsersDay * 7 > 400;
        } else if (cliff.id === "omnisend_200") {
          fire = paidSubs >= 1;
        } else if (cliff.id === "mailgun_pmf_primary") {
          fire = newUsersMonth > 80 || newUsersDay * 7 > 80;
        } else if (cliff.id === "emailoctopus_2000") {
          fire = providerContactsSim("emailoctopus", ctx, byProvider) > 2000;
        } else if (cliff.id === "mailerlite_overflow") {
          fire = activeRules.includes("emailoctopus_cap");
        } else if (cliff.id === "brevo_starter_monthly") {
          const brevoRow = providerRows.find((p) => p.id === "brevo");
          fire = useBrevoStarter && (brevoRow?.monthly || 0) > 16000;
        } else if (cliff.id === "brevo_agent") {
          fire = dailyPeaks.brevo > 250;
        }
        if (fire) triggeredCliffs.push(cliff);
      }

      const goalsNote = useBrevoStarter
        ? "Brevo Starter ($29/mo · 20k sends/mo): OmniSend deprecated; watch 20k/month ceiling."
        : "Before first paid sub: free Brevo (300/day · 2k contacts). Upgrade to Starter at $29/mo when PH or paid lifecycle binds.";

      return {
        providerRows,
        firstStall: failures[0] || null,
        activeRules,
        triggeredCliffs,
        goalsNote,
        autoPaid,
        totalUsers,
        newUsersDay,
        newUsersMonth,
        rateInconsistent,
        dailyPeaks,
      };
    }

    function renderScenarioPlannerShell() {
      const lc = emailData?.launch_config || {};
      const presets = emailData?.scenario_presets || [];
      const audience = lc.launch_brevo_audience ?? 222;
      const dayMax = lc.slider_day_max ?? 1000;
      const monthMax = lc.slider_month_max ?? 3000;
      const dayDefault = lc.default_new_users_per_day_max ?? 7;
      const monthDefault = lc.default_new_users_per_month_max ?? 200;
      const presetBtns = presets
        .map(
          (p) =>
            `<button type="button" class="scenario-preset-btn" data-day="${p.new_users_per_day_max ?? 0}" data-month="${p.new_users_per_month_max ?? 0}" data-mode="${escapeHtml(p.mode)}" data-paid="${p.paid_override ?? ""}">${escapeHtml(p.label)}</button>`
        )
        .join("");
      return `<section id="capacity-scenarios">
        <h2>PH scenario planner</h2>
        <p class="section-cap">Set max new-user rates to see where free tiers break. Launch audience: <strong>${audience}</strong> Brevo recipients (175 waitlist + 47 internal). Daily max stress-tests send caps; monthly max drives lifecycle volume and contacts.</p>
        <div class="scenario-controls">
          <div class="scenario-control-group">
            <label for="scenario-day-max">New users / day (max)</label>
            <input type="range" id="scenario-day-max" min="0" max="${dayMax}" step="1" value="${dayDefault}" />
            <input type="number" id="scenario-day-max-num" min="0" max="${dayMax}" step="1" value="${dayDefault}" />
          </div>
          <div class="scenario-control-group">
            <label for="scenario-month-max">New users / month (max)</label>
            <input type="range" id="scenario-month-max" min="0" max="${monthMax}" step="10" value="${monthDefault}" />
            <input type="number" id="scenario-month-max-num" min="0" max="${monthMax}" step="1" value="${monthDefault}" />
          </div>
          <div class="scenario-control-group">
            <label for="scenario-paid">Paid subscribers <span id="scenario-paid-mode" class="section-cap">(auto)</span></label>
            <input type="range" id="scenario-paid" min="0" max="500" step="5" value="0" />
            <input type="number" id="scenario-paid-num" min="0" max="500" step="1" value="0" />
            <label class="scenario-override-toggle"><input type="checkbox" id="scenario-paid-override" /> Override auto</label>
          </div>
          <div class="scenario-control-group">
            <label>Mode</label>
            <label><input type="radio" name="scenario-mode" value="launch_week" checked /> Launch week</label>
            <label><input type="radio" name="scenario-mode" value="steady_month" /> Steady month</label>
          </div>
          <div class="scenario-presets">${presetBtns}</div>
        </div>
        <div id="scenario-summary"></div>
        <div id="scenario-provider-cards" class="capacity-kpi-row"></div>
      </section>`;
    }

    function updateScenarioUI() {
      const dayEl = document.getElementById("scenario-day-max");
      const paidOverrideCb = document.getElementById("scenario-paid-override");
      if (!dayEl) return;

      const newUsersDay = Number(document.getElementById("scenario-day-max-num")?.value || dayEl.value);
      const newUsersMonth = Number(document.getElementById("scenario-month-max-num")?.value || document.getElementById("scenario-month-max")?.value);
      const mode = document.querySelector('input[name="scenario-mode"]:checked')?.value || "launch_week";
      const paidOverrideOn = paidOverrideCb?.checked;
      const paidVal = Number(document.getElementById("scenario-paid-num")?.value || 0);
      const sim = simulateCapacity({
        newUsersPerDayMax: newUsersDay,
        newUsersPerMonthMax: newUsersMonth,
        mode,
        paidOverride: paidOverrideOn ? paidVal : null,
      });

      const modeEl = document.getElementById("scenario-paid-mode");
      if (modeEl) modeEl.textContent = paidOverrideOn ? "(override)" : `(auto: ${sim.autoPaid})`;

      if (!paidOverrideOn) {
        const paidSlider = document.getElementById("scenario-paid");
        const paidNum = document.getElementById("scenario-paid-num");
        if (paidSlider) paidSlider.value = sim.autoPaid;
        if (paidNum) paidNum.value = sim.autoPaid;
      }

      const summaryEl = document.getElementById("scenario-summary");
      if (summaryEl) {
        const stall = sim.firstStall;
        const rateWarn = sim.rateInconsistent
          ? `<div class="banner banner-info">Daily max × 30 (${(newUsersDay * 30).toLocaleString()}) exceeds monthly max (${newUsersMonth.toLocaleString()}) — peak-day stress uses daily; volume uses monthly.</div>`
          : "";
        const stallBanner = stall
          ? `<div class="banner banner-warn"><strong>First stall:</strong> ${escapeHtml(stall.name)} — ${escapeHtml(stall.type)} (${Math.round(stall.used).toLocaleString()} / ${stall.limit.toLocaleString()})</div>`
          : `<div class="banner banner-live">All providers within free-tier limits at ${newUsersDay.toLocaleString()}/day · ${newUsersMonth.toLocaleString()}/mo (${mode.replace("_", " ")}).</div>`;
        const rules = sim.activeRules.length
          ? `<div class="routing-pills">${sim.activeRules
              .map((id) => {
                const rule = (emailData?.routing_rules || []).find((r) => r.id === id);
                return `<span class="routing-pill" title="${escapeHtml(rule?.notes || "")}">${escapeHtml(rule?.label || id)}</span>`;
              })
              .join("")}</div>`
          : "";
        const cliffs = sim.triggeredCliffs.length
          ? `<p class="section-cap"><strong>Cliffs triggered:</strong> ${sim.triggeredCliffs
              .map((c) => `<a href="#cliff-${escapeHtml(c.id)}">${escapeHtml(c.id)}</a>`)
              .join(" · ")}</p>`
          : "";
        summaryEl.innerHTML = `${rateWarn}${stallBanner}${rules}${cliffs}<p class="section-cap">${escapeHtml(sim.goalsNote)} · Total users: ${sim.totalUsers.toLocaleString()} · Brevo peak day: ~${Math.round(sim.dailyPeaks?.brevo || 0).toLocaleString()}/300</p>`;
      }

      const cardsEl = document.getElementById("scenario-provider-cards");
      if (cardsEl) {
        cardsEl.innerHTML = sim.providerRows
          .filter((p) => p.worst && p.worst.pct > 0.01)
          .map((p) => {
            const pct = Math.min(100, Math.round(100 * p.worst.pct));
            return `<div class="capacity-kpi-card status-${p.status}" title="${escapeHtml(p.barLabel)}">
              <span class="capacity-kpi-name">${escapeHtml(p.name)}</span>
              <div class="capacity-kpi-bar"><div class="capacity-kpi-fill status-${p.status}" style="width:${pct}%"></div></div>
              <span class="capacity-kpi-meta">${escapeHtml(p.barLabel)} · <span class="status-pill status-${p.status}">${escapeHtml(p.status.replace("_", " "))}</span></span>
            </div>`;
          })
          .join("");
      }
    }

    function bindScenarioPlanner() {
      const syncPair = (rangeId, numId) => {
        const range = document.getElementById(rangeId);
        const num = document.getElementById(numId);
        if (!range || !num) return;
        range.addEventListener("input", () => {
          num.value = range.value;
          updateScenarioUI();
        });
        num.addEventListener("input", () => {
          range.value = num.value;
          updateScenarioUI();
        });
      };
      syncPair("scenario-day-max", "scenario-day-max-num");
      syncPair("scenario-month-max", "scenario-month-max-num");
      syncPair("scenario-paid", "scenario-paid-num");

      document.getElementById("scenario-paid-override")?.addEventListener("change", updateScenarioUI);
      document.querySelectorAll('input[name="scenario-mode"]').forEach((el) => {
        el.addEventListener("change", updateScenarioUI);
      });

      document.querySelectorAll(".scenario-preset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const day = Number(btn.getAttribute("data-day"));
          const month = Number(btn.getAttribute("data-month"));
          const mode = btn.getAttribute("data-mode");
          const paid = btn.getAttribute("data-paid");
          document.getElementById("scenario-day-max").value = day;
          document.getElementById("scenario-day-max-num").value = day;
          document.getElementById("scenario-month-max").value = month;
          document.getElementById("scenario-month-max-num").value = month;
          if (mode) {
            const radio = document.querySelector(`input[name="scenario-mode"][value="${mode}"]`);
            if (radio) radio.checked = true;
          }
          const overrideCb = document.getElementById("scenario-paid-override");
          if (paid !== "" && paid != null) {
            if (overrideCb) overrideCb.checked = true;
            document.getElementById("scenario-paid").value = paid;
            document.getElementById("scenario-paid-num").value = paid;
          } else if (overrideCb) {
            overrideCb.checked = false;
          }
          updateScenarioUI();
        });
      });

      updateScenarioUI();
    }

    function renderCharterNav() {
      return `<nav class="charter-toc" aria-label="Charter sections">
        <a href="#overview">Charter</a>
        <a href="#sequences">Sequences</a>
        <a href="#buckets">DAU buckets</a>
        <a href="#provider-capacity">Capacity</a>
        <a href="#capacity-scenarios">Scenario planner</a>
        <a href="#capacity">Cliffs</a>
        <a href="#providers">Providers</a>
        <a href="#preview-gallery">Previews</a>
        <a href="#ops">Ops loop</a>
      </nav>`;
    }

    function renderCliffsTable() {
      return `<table class="cliffs-table">
        <thead><tr><th>Cliff</th><th>Provider</th><th>Trigger</th><th>Action</th></tr></thead>
        <tbody>${(emailData?.capacity_cliffs || [])
          .map((c) => {
            const p = providerById(c.provider_id);
            return `<tr id="cliff-${escapeHtml(c.id)}">
              <td>${escapeHtml(c.id)}</td>
              <td>${escapeHtml(p?.name || c.provider_id)}</td>
              <td>${escapeHtml(c.trigger)}</td>
              <td>${escapeHtml(c.action)}</td>
            </tr>`;
          })
          .join("")}</tbody>
      </table>`;
    }

    function renderSequenceTable() {
      const rows = (emailData?.sequences || [])
        .map((seq) => {
          return `<tr class="seq-row" data-bucket="${escapeHtml((seq.buckets || []).join(","))}" data-provider="${escapeHtml(seq.provider_id)}" data-overflow="${escapeHtml(seq.provider_overflow_id || "")}" data-phase="${escapeHtml(seq.phase)}">
            <td><strong>${escapeHtml(seq.name)}</strong>${phaseBadge(seq.phase)}</td>
            <td>${implementationStatusBadge(seq)}</td>
            <td>${providerCell(seq)}</td>
            <td>${requirementsCell(seq)}</td>
            <td>${metricLinks(seq)}</td>
            <td>${previewCell(seq)}</td>
          </tr>`;
        })
        .join("");
      return `<div class="seq-table-wrap">
        <table class="seq-table">
          <thead><tr>
            <th>Sequence</th><th>Status</th><th>Provider</th><th>Requirements</th><th>Metrics</th><th>Preview</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    function renderFilters() {
      const providers = emailData?.providers || [];
      const buckets = [
        ...(emailData?.buckets || []).map((b) => [b.key, b.label]),
        ...(emailData?.pseudo_buckets || []).map((b) => [b.key, b.label]),
      ];
      return `<div class="filter-bar">
        <label>Bucket <select id="filter-bucket"><option value="">All</option>${buckets.map(([k, l]) => `<option value="${escapeHtml(k)}">${escapeHtml(l)}</option>`).join("")}</select></label>
        <label>Provider <select id="filter-provider"><option value="">All</option>${providers.map((p) => `<option value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</option>`).join("")}</select></label>
        <label>Phase <select id="filter-phase"><option value="">All</option><option value="1-adam">Adam (Phase 1)</option><option value="1-new">New additions</option></select></label>
        <span id="filter-count" class="section-cap"></span>
      </div>`;
    }

    function applyFilters() {
      const bucket = document.getElementById("filter-bucket")?.value || "";
      const provider = document.getElementById("filter-provider")?.value || "";
      const phase = document.getElementById("filter-phase")?.value || "";
      const rows = document.querySelectorAll(".seq-row");
      let visible = 0;
      rows.forEach((row) => {
        const buckets = (row.getAttribute("data-bucket") || "").split(",");
        const matchBucket = !bucket || buckets.includes(bucket);
        const matchProvider =
          !provider ||
          row.getAttribute("data-provider") === provider ||
          row.getAttribute("data-overflow") === provider;
        const matchPhase = !phase || row.getAttribute("data-phase") === phase;
        const show = matchBucket && matchProvider && matchPhase;
        row.classList.toggle("hidden", !show);
        if (show) visible++;
      });
      const el = document.getElementById("filter-count");
      if (el) el.textContent = `Showing ${visible} of ${rows.length} sequences`;
    }

    function bindFilters() {
      ["filter-bucket", "filter-provider", "filter-phase"].forEach((id) => {
        document.getElementById(id)?.addEventListener("change", applyFilters);
      });
      applyFilters();
    }

    function liveBanner() {
      if (!snapshotData) {
        return `<div class="banner banner-info">Live bucket counts unavailable — showing static reference only. Open on Vercel or run <span class="code">vercel dev</span> for live cohort sizes.</div>`;
      }
      const dau = snapshotData.dau_model || {};
      const asOf = dau.as_of || snapshotData.snapshot_date || "—";
      const totals = dau.totals || {};
      return `<div class="banner banner-live">Live cohorts as of ${escapeHtml(asOf)} · DAU ${totals.dau ?? "—"} · WAU ${totals.wau ?? "—"} · MAU ${totals.mau ?? "—"} · <a href="/">Dashboard</a></div>`;
    }

    function renderPage() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <nav class="site-nav">
          <a href="/">Dashboard</a>
          <a href="/email-machine" aria-current="page">Email machine</a>
        </nav>
        <h1>User Email Machine</h1>
        <p class="caption">Project charter &amp; engineer reference — multi-provider lifecycle email system. Spec: <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/docs/USER_EMAIL_MACHINE_PROPOSAL.md">USER_EMAIL_MACHINE_PROPOSAL.md</a> · Agent: <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/PLAN.md">PLAN.md</a></p>
        ${liveBanner()}
        ${renderCharterNav()}
        <section id="overview">
          <h2>Charter overview</h2>
          <p class="section-cap">Implementation guide for engineers wiring Oasis lifecycle email across six free-tier providers. Goals: <strong>500 paid subscribers by Dec 31, 2026</strong>, <strong>4.5× DAU</strong> vs Product Hunt launch week, <strong>80% gross margin</strong>.</p>
          <div class="info">
            <ul style="margin:0;padding-left:1.25rem">
              <li><strong>Provider</strong> — strategy routing per proposal; muted line when Brevo interim template differs from target</li>
              <li><strong>Requirements</strong> — audience, cadence, when, Supabase trigger spec, and outreach_log dedup (implementation spec for engineers)</li>
              <li><strong>Status</strong> — multi-provider / CS agent implementation (<span class="code">shipped</span> vs <span class="code">needs_implementation</span>)</li>
              <li><strong>Near limit</strong> — alert at 80% of contacts/sends or &lt;2 months runway (<span class="code">email_provider_capacity</span> in snapshot)</li>
            </ul>
          </div>
          <div class="flow-diagram">
            <strong>DAU buckets (active):</strong> New + Current + Reactivated + Resurrected = DAU<br>
            <strong>Inactive:</strong> At-risk WAU → At-risk MAU → Dead → (Resurrection_Rate) → Resurrected<br>
            <strong>Monetization cross-cuts:</strong> Limit hitters → Brevo · Stripe paid → Brevo Starter $29/mo (replaces OmniSend)<br>
            <strong>Acquisition funnel:</strong> PH teaser / launch (<span class="code">ph-waitlist/</span>) — reusable for future launches.
          </div>
        </section>
        <section id="sequences">
          <h2>Sequence reference</h2>
          <p class="section-cap">Requirements column = implementation spec for engineers (audience, cadence, Supabase trigger, dedup). Filter to find a cohort. <strong>2 of 12 sequences implemented</strong> (PH waitlist only).</p>
          ${renderFilters()}
          ${renderSequenceTable()}
        </section>
        <section id="buckets">
          <h2>DAU buckets</h2>
          <p class="section-cap">Classified daily from sessions ∪ llm_usage · same logic as <span class="code">reporting/dau_model.py</span></p>
          ${renderBucketsTable()}
        </section>
        ${renderProviderCapacity()}
        ${renderScenarioPlannerShell()}
        <section id="capacity">
          <h2>Capacity cliffs</h2>
          <p class="section-cap">When free tiers break — simulation-backed triggers. Use <a href="#capacity-scenarios">scenario planner</a> to test signup volume.</p>
          ${renderCliffsTable()}
        </section>
        <section id="providers">
          <h2>Email providers (free tier)</h2>
          <p class="section-cap">Six providers; each sequence uses one primary and optional overflow. Names link to official pricing.</p>
          <div class="provider-grid">${renderProviders()}</div>
        </section>
        ${renderPreviewGallery()}
        <section id="ops">
          <h2>Operational loop</h2>
          <div class="info">
            <ol style="margin:0;padding-left:1.25rem">
              <li><span class="code">main.py --baseline</span> → snapshot with <span class="code">dau_model</span> + <span class="code">corporate_goals</span></li>
              <li>Classify users into buckets (future CS agent daily run)</li>
              <li>Evaluate sequence triggers → route to provider queue</li>
              <li>Log sends in <span class="code">outreach_log</span> via <span class="code">dedup_trigger_name</span></li>
              <li>Monitor weekly deltas on at-risk WAU, dead, Resurrection_Rate, paid_subscribers</li>
            </ol>
          </div>
        </section>
        <footer>
          Strategy spec only — no sends implemented yet ·
          <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/PLAN.md">CS agent PLAN.md</a> ·
          <a href="/">← Dashboard</a>
        </footer>
      `;
      bindFilters();
      bindCopyButtons();
      bindScenarioPlanner();
    }

    async function loadCopyManifest() {
      try {
        const res = await fetch("/emails/copy_manifest.json", { cache: "no-store" });
        if (!res.ok) throw new Error("missing");
        copyManifest = await res.json();
      } catch {
        copyManifest = {};
      }
    }

    async function loadSnapshot() {
      try {
        const res = await fetch("/api/snapshot", { cache: "no-store" });
        if (!res.ok) throw new Error(`API ${res.status}`);
        snapshotData = await res.json();
        bucketCounts = snapshotData?.dau_model?.bucket_counts || {};
      } catch {
        snapshotData = null;
        bucketCounts = {};
      }
    }

    async function init() {
      try {
        const res = await fetch("/email_sequences.json", { cache: "no-store" });
        if (!res.ok) throw new Error("email_sequences.json missing");
        emailData = await res.json();
        await loadSnapshot();
        await loadCopyManifest();
        renderPage();
      } catch (e) {
        document.getElementById("app").innerHTML = `<p class="err">Failed to load: ${escapeHtml(e.message)}</p>`;
      }
    }

    init();
  </script>
