<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oasis Email Machine — Project Charter</title>
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <div class="wrap" id="app">
    <p class="err">Loading email machine reference…</p>
  </div>
  <script>
    let emailData = null;
    let snapshotData = null;
    let bucketCounts = {};
    let copyManifest = {};

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function providerById(id) {
      return (emailData?.providers || []).find((p) => p.id === id);
    }

    function funnelPhaseById(id) {
      return (emailData?.funnel_phases || []).find((f) => f.id === id);
    }

    const FUNNEL_PHASE_LABELS = {
      phase_1_activation: "Phase 1",
      phase_2_paid: "Phase 2 paid",
      phase_2_conversion: "Phase 2 conversion",
      phase_3_terminal: "Phase 3",
      ph_interim: "PH interim",
      operational: "Operational",
    };

    function funnelPhaseBadge(fp) {
      if (!fp) return "";
      const cls =
        fp === "phase_1_activation"
          ? "phase-1"
          : fp === "phase_2_paid"
            ? "phase-2-paid"
            : fp === "phase_2_conversion"
              ? "phase-2-conv"
              : fp === "ph_interim"
                ? "ph-interim"
                : fp === "operational"
                  ? "phase-operational"
                  : "phase-2-conv";
      const label = FUNNEL_PHASE_LABELS[fp] || fp.replace(/_/g, " ");
      return `<span class="funnel-phase-badge ${cls}">${escapeHtml(label)}</span>`;
    }

    function fallbackPoolMemberLabel() {
      const ids = emailData?.fallback_pool?.provider_ids || [];
      const short = { mailerlite: "ML", omnisend: "OS", loops: "Loops", resend: "Resend" };
      return ids.map((id) => short[id] || providerById(id)?.name || id).join(" · ");
    }

    function providerDisplayName(id) {
      if (!id) return "Supabase / sheet";
      if (id === "fallback_pool") {
        const members = fallbackPoolMemberLabel();
        return members ? `Fallback pool (${members})` : "Fallback pool";
      }
      if (id === "operational_pool") return "Operational pool (SES → Resend Pro)";
      const p = providerById(id);
      return p?.name || id;
    }

    function cliffProviderName(id) {
      if (id === "fallback_pool") return "Fallback pool (aggregate)";
      return providerDisplayName(id);
    }

    function touchCount(seq) {
      if (seq?.touches?.length) return seq.touches.length;
      const map = emailData?.cadence_touch_counts || CADENCE_SENDS;
      return map[seq?.cadence || "one-time"] || 1;
    }

    function fallbackTouchCell(touch) {
      const fb = touch?.fallback || {};
      if (fb.type === "none") return '<span class="section-cap">—</span>';
      if (fb.type === "provider" && fb.provider_id) {
        return escapeHtml(providerDisplayName(fb.provider_id));
      }
      const members = fallbackPoolMemberLabel();
      return `<span class="routing-pill" title="When Brevo, EmailOctopus, or Resend at cap — route to pool with headroom">Fallback pool${members ? ` (${members})` : ""}</span>`;
    }

    function primaryTouchCell(touch, seq) {
      const name = escapeHtml(providerDisplayName(touch.primary_provider_id));
      let html = name;
      if (touch.interim_provider_id) {
        html += `<br><span class="section-cap">PH interim: ${escapeHtml(providerDisplayName(touch.interim_provider_id))}</span>`;
      } else if (seq?.deployed_via && seq.deployed_via !== touch.primary_provider_id) {
        html += `<br><span class="section-cap">PH interim: ${escapeHtml(providerDisplayName(seq.deployed_via))}</span>`;
      }
      return html;
    }

    function inventoryPhaseOrder() {
      return ["ph_interim", "phase_1_activation", "phase_2_paid", "phase_2_conversion", "operational"];
    }

    function renderEmailInventory() {
      const phases = inventoryPhaseOrder();
      const fpLookup = Object.fromEntries((emailData?.funnel_phases || []).map((f) => [f.id, f]));
      const seqById = Object.fromEntries((emailData?.sequences || []).map((s) => [s.id, s]));
      let globalOrd = 0;
      const sections = phases.map((fpId) => {
        const fp = fpLookup[fpId] || { label: FUNNEL_PHASE_LABELS[fpId] || fpId };
        const seqIds =
          fpId === "ph_interim"
            ? (emailData?.sequences || []).filter((s) => s.funnel_phase === "ph_interim").map((s) => s.id)
            : fp.sequences || (emailData?.sequences || []).filter((s) => s.funnel_phase === fpId).map((s) => s.id);
        const rows = [];
        for (const sid of seqIds) {
          const seq = seqById[sid];
          if (!seq) continue;
          const touches = seq.touches || [];
          if (!touches.length) {
            globalOrd++;
            rows.push({ seq, touch: null, ord: globalOrd });
            continue;
          }
          for (const touch of touches) {
            globalOrd++;
            rows.push({ seq, touch, ord: globalOrd });
          }
        }
        if (!rows.length) return "";
        const budget =
          fp.emails_per_user_min != null
            ? `<p class="section-cap phase-budget">${rows.length} touch(es) cataloged · user budget ${fp.emails_per_user_min}–${fp.emails_per_user_max} emails</p>`
            : `<p class="section-cap phase-budget">${rows.length} touch(es) cataloged</p>`;
        const phaseContext =
          fpId === "phase_1_activation" && (fp.readiness_model || fp.nurture_model || fp.notes)
            ? `<p class="section-cap phase-context">${escapeHtml(fp.readiness_model || fp.nurture_model || fp.notes)}</p>`
            : "";
        const tableRows = rows
          .map(({ seq, touch, ord }) => {
            const t = touch || {};
            const when = t.day_offset != null ? `D${t.day_offset} · ${t.trigger_when || seq.trigger_when || ""}` : seq.trigger_when || "—";
            const hasFallback = (t.fallback?.type === "fallback_pool") || seq.provider_overflow_id === "fallback_pool";
            const interim = t.interim_provider_id || (["welcome", "activation_nudge"].includes(seq.id) ? "brevo" : "");
            const hasPreview = touch ? touchHasPreview(seq, touch) : touchHasPreview(seq, null);
            return `<tr class="touch-row seq-row" data-bucket="${escapeHtml((seq.buckets || []).join(","))}" data-provider="${escapeHtml(t.primary_provider_id || seq.provider_id)}" data-overflow="${escapeHtml(seq.provider_overflow_id || "")}" data-funnel-phase="${escapeHtml(seq.funnel_phase || fpId)}" data-has-fallback="${hasFallback ? "1" : "0"}" data-ph-interim="${interim ? "1" : "0"}" data-has-preview="${hasPreview ? "1" : "0"}" data-sequence-id="${escapeHtml(seq.id)}">
              <td>${ord}</td>
              <td><strong>${escapeHtml(t.name || seq.name)}</strong><br><span class="code section-cap">${escapeHtml(seq.id)}</span>${seq.inflection ? ' <span class="routing-pill">upgrade inflection</span>' : ""}</td>
              <td>${bucketPills(seq.buckets)}</td>
              <td>${escapeHtml(when)}</td>
              <td>${touch ? primaryTouchCell(touch, seq) : providerCell(seq)}</td>
              <td>${touch ? fallbackTouchCell(touch) : (seq.provider_overflow_id === "fallback_pool" ? fallbackTouchCell({ fallback: { type: "fallback_pool" } }) : '<span class="section-cap">—</span>')}</td>
              <td><span class="code">${escapeHtml(t.dedup_trigger_name || seq.dedup_trigger_name || "")}</span></td>
              <td>${implementationStatusBadge(seq)}</td>
              <td>${previewCell(seq, touch)}</td>
            </tr>`;
          })
          .join("");
          return `<div class="inventory-phase-group" data-funnel-phase-group="${escapeHtml(fpId)}">
          <h3 class="inventory-phase-heading">${escapeHtml(fp.label || FUNNEL_PHASE_LABELS[fpId] || fpId)}</h3>
          ${phaseContext}
          ${budget}
          <div class="seq-table-wrap">
            <table class="seq-table inventory-table">
              <thead><tr><th>#</th><th>Email</th><th>Audience</th><th>When</th><th>Primary</th><th>Fallback</th><th>Dedup</th><th>Status</th><th>Preview</th></tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        </div>`;
        })
        .join("");
      return `<div class="email-inventory">${sections}</div>`;
    }

    function sequenceImplementationStats() {
      const seqs = emailData?.sequences || [];
      const shipped = seqs.filter((s) => inferImplementationStatus(s) === "shipped").length;
      return { shipped, total: seqs.length, pending: seqs.length - shipped };
    }

    function sequencesForPhase(phaseId) {
      return (emailData?.sequences || []).filter((s) => s.funnel_phase === phaseId);
    }

    function formatSendLimits(lim) {
      if (!lim) return [];
      const parts = [];
      if (lim.emails_per_day != null) parts.push(`${lim.emails_per_day}/day`);
      if (lim.emails_per_month != null) parts.push(`${Number(lim.emails_per_month).toLocaleString()}/mo`);
      return parts;
    }

    function formatLimits(p) {
      if (!p?.free_limits) return "—";
      const lim = p.free_limits;
      const parts = [];
      if (lim.marketing_emails_per_month != null) {
        parts.push(`${lim.marketing_emails_per_month.toLocaleString()}/mo marketing`);
      }
      parts.push(...formatSendLimits(lim));
      if (lim.contacts != null) {
        parts.push(`${lim.contacts.toLocaleString()} contacts`);
      }
      if (p.status === "deprecated") {
        parts.push("archived");
      }
      return parts.join(" · ") || "—";
    }

    function bucketLabel(key) {
      const b = (emailData?.buckets || []).find((x) => x.key === key);
      if (b) return b.label;
      const p = (emailData?.pseudo_buckets || []).find((x) => x.key === key);
      return p ? p.label : key;
    }

    function bucketPills(keys) {
      return (keys || [])
        .map(
          (k) =>
            `<span class="bucket-pill bucket-${escapeHtml(k)}">${escapeHtml(bucketLabel(k))}</span>`
        )
        .join("");
    }

    function phaseBadge(phase) {
      if (phase === "1-adam") {
        return '<span class="phase-badge phase-adam">Adam</span>';
      }
      if (phase === "1-new") {
        return '<span class="phase-badge phase-new">New</span>';
      }
      return "";
    }

    function liveCountForBucket(key) {
      if (bucketCounts[key] == null) return "";
      return `<span class="live-count">${bucketCounts[key]} users</span>`;
    }

    function metricLinks(seq) {
      const anchors = seq.dashboard_anchors || [];
      const metrics = seq.dashboard_metrics || [];
      const links = anchors.map(
        (a) => `<a class="metric-link" href="/#${escapeHtml(a)}">#${escapeHtml(a)}</a>`
      );
      metrics.slice(0, 3).forEach((m) => {
        links.push(`<span class="code">${escapeHtml(m)}</span>`);
      });
      return links.join(" ") || "—";
    }

    function getPreview(seq) {
      return seq?.preview && typeof seq.preview === "object" ? seq.preview : null;
    }

    function resolvePreview(seq, touch) {
      if (touch?.preview && typeof touch.preview === "object" && touch.preview.source) {
        return touch.preview;
      }
      return getPreview(seq);
    }

    function resolvePreviewPath(seq, touch) {
      const p = resolvePreview(seq, touch);
      if (p?.path) return p.path;
      if (touch?.touch_id) return `/emails/${touch.touch_id}.html`;
      return getPreviewPath(seq);
    }

    function manifestKey(seq, touch) {
      return touch?.touch_id || seq.id;
    }

    function touchHasPreview(seq, touch) {
      const p = resolvePreview(seq, touch);
      return !!(p?.source || resolvePreviewPath(seq, touch));
    }

    function getPreviewPath(seq) {
      const p = getPreview(seq);
      return p?.path || seq.preview_path || null;
    }

    function previewDeployLine(seq, touch) {
      const preview = resolvePreview(seq, touch);
      const prov = preview?.deploy_provider || touch?.primary_provider_id || seq.provider_id;
      if (!prov) return "";
      let label = providerDisplayName(prov);
      const interim = touch?.interim_provider_id || seq.deployed_via;
      if (interim && interim !== prov) {
        label += ` · interim: ${providerDisplayName(interim)}`;
      }
      return `<p class="preview-deploy-target"><span class="preview-deploy-badge">Deploy</span> ${escapeHtml(label)}</p>`;
    }

    function inferImplementationStatus(seq) {
      if (seq.implementation_status) return seq.implementation_status;
      return "needs_implementation";
    }

    function implementationStatusBadge(seq) {
      const status = inferImplementationStatus(seq);
      const cls =
        status === "shipped"
          ? "status-shipped"
          : status === "needs_implementation"
            ? "status-needs-implementation"
            : "status-planned";
      return `<span class="status-pill ${cls}">${escapeHtml(status.replace(/_/g, " "))}</span>`;
    }

    const CADENCE_LABELS = {
      "one-time": "One-time send",
      "drip-2-4": "Drip (2–4 touches)",
      "one-time-plus-d7": "One-time + D7 reminder",
      "campaign-2-touch": "2-touch campaign",
      "one-time-plus-d14": "One-time + D14 follow-up",
    };

    function cadenceLabel(cadence) {
      return CADENCE_LABELS[cadence] || cadence || "—";
    }

    function providerCell(seq) {
      let html = strategyProviderCell(seq);
      if (seq.deployed_via && seq.deployed_via !== seq.provider_id) {
        const shipped = providerById(seq.deployed_via);
        html += `<br><span class="section-cap">Brevo interim: ${escapeHtml(shipped?.name || seq.deployed_via)}</span>`;
      }
      return html;
    }

    function emailBudgetLine(seq) {
      const fp = funnelPhaseById(seq.funnel_phase);
      if (fp?.emails_per_user_min != null) {
        return `<br><strong>Email budget:</strong> ${fp.emails_per_user_min}–${fp.emails_per_user_max} per user`;
      }
      const cc = emailData?.launch_config?.conversion_config;
      if (seq.funnel_phase === "phase_2_conversion" && cc) {
        return `<br><strong>Email budget:</strong> ${cc.phase_2_conversion_emails_min}–${cc.phase_2_conversion_emails_max} (part of ${cc.total_emails_before_perpetual_free_min}–${cc.total_emails_before_perpetual_free_max} total)`;
      }
      return "";
    }

    function requirementsCell(seq) {
      const cadence = cadenceLabel(seq.cadence);
      return `<div class="requirements-cell">
        <div class="requirements-plain">
          <strong>Audience:</strong> ${bucketPills(seq.buckets)}<br>
          <strong>Frequency:</strong> ${escapeHtml(cadence)}<br>
          <strong>When:</strong> ${escapeHtml(seq.trigger_when || "—")}<br>
          ${escapeHtml(seq.trigger_summary || "")}${emailBudgetLine(seq)}
        </div>
        <div class="requirements-tech">
          <span class="code">${escapeHtml(seq.trigger_implementation || "")}</span><br>
          <span class="code">dedup: ${escapeHtml(seq.dedup_trigger_name || "")}</span> · outreach_log
        </div>
      </div>`;
    }

    function strategyProviderCell(seq) {
      const primary = providerById(seq.provider_id);
      const primaryName = escapeHtml(primary?.name || seq.provider_id);
      if (seq.provider_overflow_id === "fallback_pool") {
        return `${primaryName} <span class="section-cap">→ fallback pool</span>`;
      }
      if (seq.provider_overflow_id) {
        const overflow = providerById(seq.provider_overflow_id);
        return `${primaryName} <span class="section-cap">→ ${escapeHtml(overflow?.name || seq.provider_overflow_id)}</span>`;
      }
      return primaryName;
    }

    function capacityForProvider(id) {
      return (snapshotData?.email_provider_capacity?.providers || []).find((p) => p.id === id);
    }

    function providerStatusClass(id) {
      const cap = capacityForProvider(id);
      if (!cap) return "";
      return cap.status === "at_limit" ? "provider-at-limit" : cap.status === "near_limit" ? "provider-near-limit" : "";
    }

    async function copyToClipboard(text, btn) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        if (btn) {
          const prev = btn.textContent;
          btn.textContent = "Copied";
          btn.classList.add("toast-copied");
          setTimeout(() => {
            btn.textContent = prev;
            btn.classList.remove("toast-copied");
          }, 1500);
        }
      } catch {
        alert("Copy failed — select text manually.");
      }
    }

    function copyButtonsHtml(seqId) {
      const entry = copyManifest[seqId];
      if (!entry) {
        return `<span class="section-cap">Run build to generate copy manifest</span>`;
      }
      const plainBtn = entry.plain_text
        ? `<button type="button" class="copy-btn" data-copy-kind="plain" data-seq="${escapeHtml(seqId)}">Copy plain text</button>`
        : "";
      return `<div class="copy-btn-row">
        <button type="button" class="copy-btn" data-copy-kind="html" data-seq="${escapeHtml(seqId)}">Copy HTML</button>
        ${plainBtn}
      </div>`;
    }

    let copyButtonsDelegated = false;

    function bindCopyButtons() {
      if (copyButtonsDelegated) return;
      copyButtonsDelegated = true;
      document.addEventListener("click", (e) => {
        const btn = e.target.closest(".copy-btn");
        if (!btn) return;
        const inline = btn.getAttribute("data-copy-inline");
        if (inline) {
          copyToClipboard(inline, btn);
          return;
        }
        const seqId = btn.getAttribute("data-seq");
        const kind = btn.getAttribute("data-copy-kind");
        const entry = copyManifest[seqId];
        if (!entry) return;
        const text = kind === "plain" ? entry.plain_text : entry.html;
        copyToClipboard(text, btn);
      });
    }

    function providerStatusPill(id) {
      const cap = capacityForProvider(id);
      if (!cap) return "";
      return `<span class="status-pill status-${cap.status}">${escapeHtml(cap.status.replace("_", " "))}</span>`;
    }

    const SETUP_STATUS_LABELS = {
      ready: "Ready",
      pending_verification: "Pending verification",
      sandbox: "Sandbox",
      account_recovery: "Account recovery",
      access_blocked: "Access blocked",
      not_started: "Not started",
    };

    const SETUP_ROLE_LABELS = {
      phase_1_primary: "Phase 1 primary",
      phase_2_paid: "Phase 2 paid",
      phase_2_conversion: "Phase 2 conversion",
      phase_3_terminal: "Phase 3 terminal",
      fallback: "Fallback pool",
      operational: "Operational pool",
    };

    function setupStatusPill(provider) {
      const st = provider?.account_setup?.status;
      if (!st) return "";
      const label = SETUP_STATUS_LABELS[st] || st.replace(/_/g, " ");
      return `<span class="setup-pill setup-${escapeHtml(st)}">${escapeHtml(label)}</span>`;
    }

    function formatSetupBool(v) {
      if (v === true) return "Yes";
      if (v === false) return "No";
      return "—";
    }

    function renderMcpCard(provider) {
      const mcp = provider?.mcp;
      if (!mcp) return "";
      const anchor = `${provider.id}-mcp`;
      const connector = mcp.connector_url || "";
      const title = `${provider.name} MCP`;
      const authNote =
        mcp.auth === "bearer_mcp_token"
          ? `<p class="section-cap"><strong>Auth:</strong> Bearer token via <span class="code">${escapeHtml(mcp.env_var || "BREVO_MCP_TOKEN")}</span> in <span class="code">.env</span> (MCP-capable API key from Brevo dashboard — not committed to git).</p>`
          : `<p class="section-cap">OAuth in browser after adding the connector URL (paid-plan early access).</p>`;
      const docLink = mcp.announcement_url
        ? `<a href="${escapeHtml(mcp.announcement_url)}" target="_blank" rel="noopener">Documentation</a>`
        : "";
      return `<div class="setup-mcp-card" id="${escapeHtml(anchor)}">
          <h3>${escapeHtml(title)} <span class="routing-pill">AI connector</span></h3>
          <p class="section-cap">Separate from REST API keys where applicable. ${docLink}${mcp.capabilities ? ` · ${escapeHtml(String(mcp.capabilities).replace(/_/g, " "))}` : ""}</p>
          ${connector ? `<p class="section-cap"><strong>Connector URL:</strong> <code class="setup-mcp-url">${escapeHtml(connector)}</code>
            <button type="button" class="copy-btn" data-copy-inline="${escapeHtml(connector)}">Copy URL</button></p>` : ""}
          ${authNote}
          <p class="section-cap"><strong>Cursor:</strong> ${escapeHtml(mcp.cursor_steps || "Add MCP server in Settings → MCP.")}</p>
        </div>`;
    }

    function renderBrevoLaunchPlan() {
      const plan = emailData?.launch_config?.brevo_launch_plan;
      if (!plan) return "";
      const why = (plan.why || []).map((line) => `<li>${escapeHtml(line)}</li>`).join("");
      const price = plan.price_usd_monthly != null ? `$${plan.price_usd_monthly}/mo` : "$29/mo";
      const limits = escapeHtml(plan.limits_summary || "20,000 emails/mo · 500,000 contacts");
      return `<section id="launch-brevo" class="launch-plan-card">
        <h2>${escapeHtml(plan.headline || "Brevo Starter for launch")}</h2>
        <p class="section-cap"><strong>Charter default for Product Hunt:</strong> upgrade Phase 1 primary <strong>Brevo</strong> to <strong>Starter</strong> (${escapeHtml(price)} · ${limits}) before launch week. Scenario planner below models this tier by default.</p>
        <ul class="launch-plan-why">${why}</ul>
        <p class="section-cap"><strong>After launch:</strong> ${escapeHtml(plan.after_launch || "")}</p>
        <p class="section-cap">${escapeHtml(plan.overflow_note || "")} · <a href="#capacity-scenarios">Stress-test volume</a> · <a href="https://www.brevo.com/pricing" target="_blank" rel="noopener noreferrer">Brevo pricing</a></p>
      </section>`;
    }

    function lifecycleChecklistBadge(status) {
      const s = status || "pending";
      const cls =
        s === "shipped" || s === "ready_local_and_edge"
          ? "status-shipped"
          : s === "optional"
            ? "status-planned"
            : "status-needs-implementation";
      return `<span class="status-pill ${cls}">${escapeHtml(s.replace(/_/g, " "))}</span>`;
    }

    function renderSupabaseLifecyclePlan() {
      const plan = emailData?.launch_config?.supabase_lifecycle_email;
      if (!plan) return "";
      const docUrl =
        "https://github.com/AdamKershner/oasis-analytics/blob/main/docs/SUPABASE_LIFECYCLE_EMAIL_PLAN.md";
      const welcomeDoc = plan.welcome_runbook
        ? `https://github.com/AdamKershner/oasis-analytics/blob/main/${plan.welcome_runbook}`
        : "";
      const currentEmail = plan.current_email
        ? `<p class="section-cap"><strong>Now building:</strong> <span class="code">${escapeHtml(plan.current_email)}</span>${welcomeDoc ? ` · <a href="${welcomeDoc}">Welcome runbook</a>` : ""}</p>`
        : "";
      const triggerRows = (plan.triggers || [])
        .map(
          (t) =>
            `<tr>
              <td>${t.implementation_status ? lifecycleChecklistBadge(t.implementation_status) : ""} <span class="code">${escapeHtml(t.dedup_trigger_name)}</span></td>
              <td>${escapeHtml(t.brevo_template)}</td>
              <td><span class="routing-pill">${escapeHtml(t.channel)}</span></td>
              <td>${escapeHtml(t.when)}</td>
              <td>${escapeHtml(t.condition)}</td>
              <td>${t.local_script ? `<span class="code">${escapeHtml(t.local_script)}</span>` : "—"}</td>
            </tr>`
        )
        .join("");
      const fnCards = (plan.edge_functions || [])
        .map(
          (f) =>
            `<div class="lifecycle-fn-card">
              <strong><span class="code">${escapeHtml(f.name)}</span></strong>
              <p class="section-cap">${escapeHtml(f.role)}</p>
              ${f.schedule_utc ? `<p class="section-cap">Cron (UTC): <span class="code">${escapeHtml(f.schedule_utc)}</span></p>` : ""}
              <p class="section-cap">Deploy: <span class="code">${escapeHtml(f.deploy)}</span></p>

        <pre class="funnel-flow-ascii">${escapeHtml(plan.architecture_ascii || "")}</pre>

            : ""
        }
      </section>`;

    function renderProviderSetup() {
      const providers = (emailData?.providers || []).filter((p) => p.account_setup);
      const meta = emailData?.provider_setup_meta || {};
      const counts = {};
      providers.forEach((p) => {
        const st = p.account_setup.status || "not_started";
        counts[st] = (counts[st] || 0) + 1;
      });
      const countParts = [];
      if (counts.ready) countParts.push(`${counts.ready} ready`);
      if (counts.sandbox) countParts.push(`${counts.sandbox} sandbox`);
      if (counts.pending_verification) countParts.push(`${counts.pending_verification} pending`);
      const blocked = (counts.access_blocked || 0) + (counts.account_recovery || 0);
      if (blocked) countParts.push(`${blocked} need action`);
      const summaryLine = countParts.length ? countParts.join(" · ") : "No setup data";
      const asOf = meta.as_of ? ` · as of ${escapeHtml(meta.as_of)}` : "";
      const apiKeyIds = meta.api_keys_ready || [];
      const apiKeyBanner = apiKeyIds.length
        ? `<div class="banner banner-live"><strong>API keys configured:</strong> ${apiKeyIds.map((id) => escapeHtml(providerDisplayName(id))).join(" · ")} (stored in env — not in this repo).</div>`
        : "";
      const mcpIds = meta.mcp_ready || [];
      const mcpBanner = mcpIds.length
        ? `<p class="section-cap"><strong>MCP in Cursor:</strong> ${mcpIds.map((id) => `<a href="#${escapeHtml(id)}-mcp">${escapeHtml(providerDisplayName(id))}</a>`).join(" · ")} — see connector cards below.</p>`
        : "";

      const rows = providers
        .map((p) => {
          const s = p.account_setup;
          const role = SETUP_ROLE_LABELS[p.funnel_role] || p.funnel_role || "—";
          return `<tr data-provider-setup="${escapeHtml(p.id)}">
            <td><strong>${escapeHtml(p.name)}</strong></td>
            <td>${escapeHtml(role)}</td>
            <td>${setupStatusPill(p)}</td>
            <td>${formatSetupBool(s.api_key_configured)}</td>
            <td>${formatSetupBool(s.domain_verified)}</td>
            <td>${s.next_action ? escapeHtml(s.next_action) : '<span class="section-cap">—</span>'}</td>
          </tr>`;
        })
        .join("");

      const blockers = providers
        .filter((p) => ["access_blocked", "account_recovery"].includes(p.account_setup?.status))
        .map(
          (p) =>
            `<div class="banner banner-warn"><strong>${escapeHtml(p.name)}:</strong> ${escapeHtml(p.account_setup.next_action || p.account_setup.notes || "Action required")}</div>`
        )
        .join("");

      const mcpBlock = providers.filter((p) => p.mcp).map((p) => renderMcpCard(p)).join("");

      return `<section id="provider-setup">
        <h2>Provider account setup (live)</h2>
        <p class="section-cap">${escapeHtml(meta.summary || "Account and API readiness — distinct from sequence automation status.")}${asOf} · <strong>${summaryLine}</strong></p>
        ${apiKeyBanner}
        ${mcpBanner}
        ${blockers}
        <table class="setup-table">
          <thead><tr><th>Provider</th><th>Role</th><th>Account</th><th>API key</th><th>Domain</th><th>Next action</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${mcpBlock}
      </section>`;
    }

    function previewOpenButton(path, title, key, preheader) {
      const preAttr = preheader ? ` data-preview-preheader="${escapeHtml(preheader)}"` : "";
      return `<button type="button" class="preview-open-btn" data-preview-path="${escapeHtml(path)}" data-preview-title="${escapeHtml(title)}" data-preview-key="${escapeHtml(key)}"${preAttr}>View preview</button>`;
    }

    function ensurePreviewModal() {
      if (document.getElementById("email-preview-modal")) return;
      const dialog = document.createElement("dialog");
      dialog.id = "email-preview-modal";
      dialog.className = "preview-modal";
      dialog.innerHTML = `
        <div class="preview-modal-inner">
          <header class="preview-modal-header">
            <h2 id="preview-modal-title" class="preview-modal-title"></h2>
            <button type="button" class="preview-modal-close" aria-label="Close preview">Close</button>
          </header>
          <p id="preview-modal-preheader" class="preview-modal-preheader section-cap"></p>
          <div id="preview-modal-copy" class="preview-modal-copy"></div>
          <div class="preview-modal-frame">
            <iframe id="preview-modal-iframe" title="Email preview" sandbox=""></iframe>
          </div>
        </div>`;
      document.body.appendChild(dialog);
    }

    function closePreviewModal() {
      const dialog = document.getElementById("email-preview-modal");
      const iframe = document.getElementById("preview-modal-iframe");
      if (iframe) iframe.removeAttribute("src");
      if (dialog?.open) dialog.close();
    }

    function openPreviewModal({ path, title, key, preheader }) {
      ensurePreviewModal();
      const dialog = document.getElementById("email-preview-modal");
      const titleEl = document.getElementById("preview-modal-title");
      const preheaderEl = document.getElementById("preview-modal-preheader");
      const copyEl = document.getElementById("preview-modal-copy");
      const iframe = document.getElementById("preview-modal-iframe");
      if (!dialog || !iframe) return;
      if (titleEl) titleEl.textContent = title || "Email preview";
      if (preheaderEl) {
        if (preheader) {
          preheaderEl.textContent = preheader;
          preheaderEl.hidden = false;
        } else {
          preheaderEl.textContent = "";
          preheaderEl.hidden = true;
        }
      }
      if (copyEl) copyEl.innerHTML = copyButtonsHtml(key);
      iframe.setAttribute("title", `${title || "Email"} preview`);
      iframe.src = path;
      if (!dialog.open) dialog.showModal();
    }

    let previewModalBound = false;

    function bindPreviewModal() {
      ensurePreviewModal();
      if (previewModalBound) return;
      previewModalBound = true;
      const dialog = document.getElementById("email-preview-modal");
      document.addEventListener("click", (e) => {
        const btn = e.target.closest(".preview-open-btn");
        if (!btn) return;
        openPreviewModal({
          path: btn.getAttribute("data-preview-path"),
          title: btn.getAttribute("data-preview-title"),
          key: btn.getAttribute("data-preview-key"),
          preheader: btn.getAttribute("data-preview-preheader") || "",
        });
      });
      dialog?.querySelector(".preview-modal-close")?.addEventListener("click", closePreviewModal);
      dialog?.addEventListener("cancel", (e) => {
        e.preventDefault();
        closePreviewModal();
      });
      dialog?.addEventListener("close", () => {
        const iframe = document.getElementById("preview-modal-iframe");
        if (iframe) iframe.removeAttribute("src");
      });
    }

    function previewCell(seq, touch) {
      const preview = resolvePreview(seq, touch);
      const path = resolvePreviewPath(seq, touch);
      const key = manifestKey(seq, touch);
      const label = touch?.name || seq.name;
      if (!path || !preview?.source) {
        return `<details class="email-preview preview-slot">
          <summary>Preview</summary>
          <div class="preview-body">Template not yet in <span class="code">brevo-oasis-emails/</span>. Add source HTML and <span class="code">preview</span> on the touch (or sequence) in <span class="code">email_sequences.json</span>, then run build.</div>
          ${previewDeployLine(seq, touch)}
        </details>`;
      }
      const subject = preview?.subject ? escapeHtml(preview.subject) : "Preview";
      return `<div class="preview-slot preview-slot-compact">
        <p class="preview-cell-subject">${subject}</p>
        ${previewDeployLine(seq, touch)}
        ${copyButtonsHtml(key)}
        ${previewOpenButton(path, label, key, preview?.preheader || "")}
      </div>`;
    }

    function galleryPreviewItems() {
      const items = [];
      for (const seq of emailData?.sequences || []) {
        const touches = seq.touches || [];
        const withTouchPreview = touches.filter((t) => t.preview?.source);
        if (withTouchPreview.length) {
          for (const touch of withTouchPreview) {
            items.push({ seq, touch, preview: touch.preview, path: resolvePreviewPath(seq, touch) });
          }
        } else if (getPreview(seq)?.source) {
          items.push({ seq, touch: null, preview: getPreview(seq), path: getPreviewPath(seq) });
        }
      }
      return items;
    }

    function renderPreviewGallery() {
      const items = galleryPreviewItems();
      if (!items.length) return "";
      const repoBase = "https://github.com/AdamKershner/oasis-analytics/blob/main/";
      const cards = items
        .map(({ seq, touch, preview, path }) => {
          const key = manifestKey(seq, touch);
          const title = touch ? `${seq.name} — ${touch.name}` : seq.name;
          const cardId = touch ? `preview-${touch.touch_id}` : `preview-${seq.id}`;
          const sourceLink = preview?.source
            ? `<a href="${repoBase}${escapeHtml(preview.source)}" target="_blank" rel="noopener">Source file</a>`
            : "";
          return `<article class="preview-card" id="${escapeHtml(cardId)}">
            <div class="preview-meta">
              <h3>${escapeHtml(title)}${phaseBadge(seq.phase)} ${implementationStatusBadge(seq)}</h3>
              ${touch ? `<p class="section-cap preview-touch-id"><span class="code">${escapeHtml(touch.touch_id)}</span></p>` : ""}
              <p class="preview-subject">${escapeHtml(preview?.subject || "")}</p>
              <p class="preview-preheader">${escapeHtml(preview?.preheader || "")}</p>
              <p class="preview-from">${escapeHtml(preview?.from_name || "")} · ${escapeHtml((touch && touch.trigger_when) || seq.trigger_when || "")}</p>
              ${previewDeployLine(seq, touch)}
              <p>${bucketPills(seq.buckets)}</p>
            </div>
            <div class="preview-card-actions">
              ${copyButtonsHtml(key)}
              ${previewOpenButton(path, title, key, preview?.preheader || "")}
            </div>
            <p class="preview-source">${sourceLink}</p>
          </article>`;
        })
        .join("");
      return `<section id="preview-gallery">
        <h2>Email previews</h2>
        <p class="section-cap">Rendered from <span class="code">brevo-oasis-emails/</span> (built to <span class="code">public/emails/{touch_id}.html</span> on deploy). Merge tags show sample values (e.g. Alex). Use <strong>Copy HTML</strong> for the raw Brevo fragment.</p>
        <div class="preview-gallery">${cards}</div>
      </section>`;
    }

    function renderProviderCard(p, seqs) {
      const used = seqs
        .filter(
          (s) =>
            s.provider_id === p.id ||
            s.provider_overflow_id === p.id ||
            (s.provider_overflow_id === "fallback_pool" && p.funnel_role === "fallback")
        )
        .map((s) => s.name);
      const nameHtml = p.pricing_url
        ? `<a href="${escapeHtml(p.pricing_url)}" target="_blank" rel="noopener">${escapeHtml(p.name)}</a>`
        : escapeHtml(p.name);
      const roleLabels = {
        phase_1_primary: "Phase 1",
        phase_2_paid: "Phase 2 paid",
        phase_2_conversion: "Phase 2 conversion",
        phase_3_terminal: "Phase 3 terminal",
        fallback: "Fallback pool",
        operational: "Operational",
      };
      const roleLabel = roleLabels[p.funnel_role]
        ? `<span class="routing-pill">${escapeHtml(roleLabels[p.funnel_role])}</span>`
        : "";
      const phTag = (p.funnel_tags || []).includes("ph_interim")
        ? `<span class="routing-pill">PH interim</span>`
        : "";
      const launchTag =
        p.id === "brevo" && emailData?.launch_config?.brevo_launch_plan
          ? `<span class="routing-pill" title="Recommended before Product Hunt">Launch: Starter $29</span>`
          : "";
      const deprecated = p.status === "deprecated" ? `<span class="section-cap"> (deprecated)</span>` : "";
      const setup = p.account_setup;
      const nextAction =
        setup && setup.status !== "ready" && setup.next_action
          ? `<div class="setup-next-action"><strong>Next:</strong> ${escapeHtml(setup.next_action)}</div>`
          : "";
      const setupNotes = setup?.notes && setup.status !== "ready"
        ? `<div class="setup-next-action">${escapeHtml(setup.notes)}</div>`
        : setup?.notes && setup.status === "ready"
          ? `<div class="section-cap">${escapeHtml(setup.notes)}</div>`
          : "";
      const mcpLink = p.mcp ? ` · <a href="#${escapeHtml(p.id)}-mcp">MCP</a>` : "";
      return `<div class="provider-card ${providerStatusClass(p.id)}" data-provider-id="${escapeHtml(p.id)}">
            <h3>${nameHtml} ${roleLabel} ${launchTag} ${phTag} ${setupStatusPill(p)} ${providerStatusPill(p.id)}${deprecated}${mcpLink}</h3>
            <div class="limits">${escapeHtml(formatLimits(p))}</div>
            <div class="constraints">${(p.constraints || []).map(escapeHtml).join(" · ")}</div>
            <div class="upgrade"><strong>Upgrade when:</strong> ${escapeHtml(p.upgrade_trigger || "—")}</div>
            ${p.notes ? `<div class="upgrade">${escapeHtml(p.notes)}</div>` : ""}
            ${setupNotes}${nextAction}
            <div class="seq-list">Sequences: ${used.length ? escapeHtml(used.join(", ")) : "—"}</div>
          </div>`;
    }

    function renderProvidersGrouped() {
      const seqs = emailData?.sequences || [];
      const providers = emailData?.providers || [];
      const pool = emailData?.fallback_pool || {};
      const poolIds = new Set(pool.provider_ids || ["mailerlite", "omnisend", "loops", "resend"]);
      const primaryRoles = new Set(["phase_1_primary", "phase_2_paid", "phase_2_conversion", "phase_3_terminal"]);
      const primary = providers.filter((p) => primaryRoles.has(p.funnel_role));
      const fallbackMembers = providers.filter((p) => poolIds.has(p.id));
      const agg = pool.aggregate_free_limits || {};
      const aggLine = agg.contacts
        ? `<p class="section-cap"><strong>Aggregate:</strong> ${Number(agg.contacts).toLocaleString()} contacts · ~${Number(agg.sends_per_month || 0).toLocaleString()} sends/mo</p>`
        : "";
      const cap = snapshotData?.email_provider_capacity?.pool_aggregate;
      const livePool = cap?.provider_count
        ? `<p class="section-cap"><strong>Live pool usage:</strong> ${Number(cap.contact_used).toLocaleString()} / ${Number(cap.contact_cap).toLocaleString()} contacts</p>`
        : "";
      const memberChips = fallbackMembers
        .map((p) => {
          const lim = pool.member_limits?.[p.id] || p.free_limits || {};
          const parts = [];
          if (lim.contacts) parts.push(`${lim.contacts.toLocaleString()} contacts`);
          parts.push(...formatSendLimits(lim));
          return `<div class="pool-member"><strong>${escapeHtml(p.name)}</strong>${parts.join(" · ")}</div>`;
        })
        .join("");
      const opPool = emailData?.operational_pool || {};
      const opPoolIds = new Set(opPool.provider_ids || ["ses", "resend"]);
      const operationalMembers = providers.filter((p) => opPoolIds.has(p.id));
      const opCap = snapshotData?.email_provider_capacity?.operational_pool_aggregate;
      const opLive = opCap?.provider_count
        ? `<p class="section-cap"><strong>Live operational usage:</strong> ${Number(opCap.daily_used || 0).toLocaleString()} / ${Number(opCap.daily_cap || 100).toLocaleString()} sends/day est.</p>`
        : "";
      return `<div class="provider-grid-grouped">
        <h3 class="provider-group-heading">Primary providers</h3>
        <div class="provider-grid">${primary.map((p) => renderProviderCard(p, seqs)).join("")}</div>
        <div class="fallback-pool-card">
          <h3>Fallback pool <span class="routing-pill">when primary at cap</span></h3>
          <p class="section-cap">${escapeHtml(pool.notes || "")}</p>
          ${aggLine}${livePool}
          <div class="pool-members">${memberChips}</div>
          <div class="provider-grid">${fallbackMembers.map((p) => renderProviderCard(p, seqs)).join("")}</div>
        </div>
        <div class="operational-pool-card">
          <h3>Operational pool <span class="routing-pill">SES → Resend Pro</span></h3>
          <p class="section-cap">${escapeHtml(opPool.notes || "")}</p>
          <p class="section-cap"><strong>While SES sandbox:</strong> upgrade <strong>Resend Pro</strong> (~$20/mo · 50k/mo · no daily cap) and run <span class="code">send_operational.py</span> — enough for full active userbase until ~50k users.</p>
          ${opLive}
          <div class="provider-grid">${operationalMembers.map((p) => renderProviderCard(p, seqs)).join("")}</div>
        </div>
      </div>`;
    }

    function renderProviders() {
      return renderProvidersGrouped();

    function renderProviderCapacity() {
      const cap = snapshotData?.email_provider_capacity;
      const providers = cap?.providers || [];
      if (!providers.length) {
        return `<section id="provider-capacity">
          <h2>Provider capacity</h2>
          <p class="section-cap">Near-limit tracking requires live snapshot. Open on Vercel or run <span class="code">vercel dev</span>.</p>
        </section>`;
      }
      const alert = cap.any_near_limit
        ? `<div class="banner banner-warn">${(providers.flatMap((p) => p.near_limit_errors || [])).map((e) => escapeHtml(e.message)).join(" · ")}</div>`
        : `<div class="banner banner-live">All providers within free-tier headroom (80% threshold).</div>`;
      const rows = providers
        .map((p) => {
          const contact = (p.metrics || []).find((m) => m.key === "contacts");
          const monthly = (p.metrics || []).find((m) => m.key === "sends_monthly");
          const daily = (p.metrics || []).find((m) => m.key === "sends_daily");
          const fmt = (m) => (m ? `${m.used.toLocaleString()} / ${m.limit.toLocaleString()} (${Math.round(100 * m.pct)}%)` : "—");
          return `<tr class="${providerStatusClass(p.id)}">
            <td><strong>${escapeHtml(p.name)}</strong> ${providerStatusPill(p.id)}</td>
            <td>${fmt(contact)}</td>
            <td>${fmt(monthly)}</td>
            <td>${fmt(daily)}</td>
            <td>${p.runway_months != null ? `${p.runway_months} mo` : "—"}</td>
            <td>${escapeHtml(p.status.replace("_", " "))}</td>
          </tr>`;
        })
        .join("");
      const pool = cap.pool_aggregate;
      const opPool = cap.operational_pool_aggregate;
      const poolBanner = pool?.provider_count
        ? `<p class="section-cap"><strong>Fallback pool:</strong> ${Number(pool.send_used).toLocaleString()} / ${Number(pool.send_cap).toLocaleString()} sends/mo · ${Number(pool.contact_used).toLocaleString()} / ${Number(pool.contact_cap).toLocaleString()} contacts (MailerLite + OmniSend + Brevo + Loops + Resend).</p>`
        : "";
      const sesBanner = cap.ses_sandbox
        ? `<div class="banner banner-warn"><strong>Amazon SES sandbox:</strong> Full-list blasts use <strong>Resend Pro backup</strong> ($20/mo · 50k/mo · no daily cap) via <span class="code">send_operational.py</span>. Request SES production for long-term primary. <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/docs/OPERATIONAL_EMAIL_RUNBOOK.md">Runbook</a>.</div>`
        : "";
      const opCapMo = opPool?.send_cap ? Math.round(opPool.send_cap).toLocaleString() : "50,000";
      const opBanner = opPool?.provider_count
        ? `<p class="section-cap"><strong>Operational pool:</strong> ${cap.ses_sandbox ? `Resend Pro backup · ${opCapMo} sends/mo est. cap` : `SES primary · ${Number(opPool.daily_used || 0).toLocaleString()} / ${Number(opPool.daily_cap || 200).toLocaleString()} sends/day est.`} — legal &amp; incident only.</p>`
        : "";
      return `<section id="provider-capacity">
        <h2>Provider capacity &amp; near-limit</h2>
        <p class="section-cap">${escapeHtml(cap.estimation_note || "")} · <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/docs/OPERATIONAL_EMAIL_RUNBOOK.md">Operational runbook</a> · <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/docs/USER_EMAIL_MACHINE_PROPOSAL.md#3b-operational--broadcast-email">Proposal §3b</a></p>
        ${sesBanner}
        ${opBanner}
        ${poolBanner}
        ${alert}
        <table class="capacity-table">
          <thead><tr><th>Provider</th><th>Contacts</th><th>Sends (mo)</th><th>Sends (day)</th><th>Runway</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </section>`;
    }

    const CADENCE_SENDS = {
      "one-time": 1,
      "drip-2-4": 4,
      "one-time-plus-d7": 2,
      "campaign-2-touch": 2,
      "one-time-plus-d14": 2,
    };

    function getBaselineState() {
      const dau = snapshotData?.dau_model || {};
      return {
        totalUsers: snapshotData?.total_users || 122,
        bucketCounts: { ...(dau.bucket_counts || { new: 0, current: 0, reactivated: 0, resurrected: 1, at_risk_wau: 16, at_risk_mau: 10, dead: 95 }) },
        monetization: { ...(snapshotData?.monetization || { paid_subscribers: 1, users_hit_limit: 1, cancelled_paid_subscribers: 0 }) },
      };
    }

    function projectBucketsForSim(totalUsers, newMonthly) {
      const dau = Math.max(1, Math.round(totalUsers * 0.08));
      const atRiskWau = Math.max(1, Math.round(dau * 0.94));
      const atRiskMau = Math.max(1, Math.round(totalUsers * 0.08));
      const dead = Math.max(0, totalUsers - dau - atRiskWau - atRiskMau - 2);
      return {
        new: Math.min(Math.max(1, Math.floor(newMonthly / 30)), 5),
        current: Math.max(0, dau - 2),
        reactivated: 1,
        resurrected: 1,
        at_risk_wau: atRiskWau,
        at_risk_mau: atRiskMau,
        dead,
      };
    }

    function seqEligible(seq, ctx) {
      const cadence = touchCount(seq);
      let eligible = 0;
      for (const b of seq.buckets || []) {
        if (b in ctx.bucketCounts) eligible += ctx.bucketCounts[b];
        else if (b === "paid") eligible += ctx.paidSubs;
        else if (b === "limit_hitter") eligible += ctx.limitHitters;
        else if (b === "cancelled_paid") eligible += ctx.cancelledPaid;
        else if (b === "waitlist") eligible += ctx.launchAudience;
        else if (b === "company_domain") eligible += ctx.companyEmailUsers;
      }
      const signupVol = ctx.signupVol;
      if (seq.id === "welcome" || seq.id === "nps_day3") eligible = signupVol;
      else if (seq.id === "pmf_day10") eligible = Math.round(signupVol * ctx.pmfPct);
      else if (seq.id === "activation_nudge") eligible = Math.round(signupVol * (1 - ctx.activationPct));
      else if (seq.id === "activation_cs_calendar") eligible = Math.round(signupVol * (1 - ctx.activationPct) * 0.5);
      else if (seq.id === "dead_resurrection") eligible = Math.min(ctx.bucketCounts.dead || 0, ctx.deadCap);
      else if (seq.id === "enterprise_founder" || seq.id === "enterprise_expansion") {
        eligible = Math.max(0, Math.round(ctx.companyEmailUsers * 0.12));
      }
      else if (seq.id === "ph_teaser" || seq.id === "ph_launch") {
        eligible = ctx.mode === "launch_week" ? ctx.launchAudience : 0;
      }
      return { sends: eligible * cadence, eligible };
    }

    const PHASE1_SEQ_IDS = new Set(["welcome", "activation_nudge", "activation_cs_calendar", "nps_day3", "pmf_day10"]);
    const FALLBACK_PROVIDER_IDS = new Set(["mailerlite", "omnisend", "loops", "resend"]);
    const PAID_SEQ_IDS = new Set(["upgrade_thank_you", "cancelled_winback"]);

    const FALLBACK_CAPS = { mailerlite: 500, omnisend: 250, loops: 1000 };
    const RESEND_DAILY_CAP = 100;

    function conversionContactDemand(ctx) {
      const conv =
        (ctx.bucketCounts.at_risk_wau || 0) +
        (ctx.bucketCounts.at_risk_mau || 0) +
        Math.min(ctx.bucketCounts.dead || 0, ctx.deadCap) +
        (ctx.bucketCounts.reactivated || 0) +
        (ctx.bucketCounts.resurrected || 0);
      return Math.max(0, conv - 2500);
    }

    function poolOverflowDemand(ctx) {
      let demand = Math.max(0, ctx.signupVol + ctx.limitHitters - 2000);
      demand += conversionContactDemand(ctx);
      return demand;
    }

    function distributePoolOverflow(totalOverflow) {
      const assigned = { mailerlite: 0, omnisend: 0, loops: 0 };
      let remaining = Math.max(0, totalOverflow);
      while (remaining > 0) {
        const headroom = {
          mailerlite: FALLBACK_CAPS.mailerlite - assigned.mailerlite,
          omnisend: FALLBACK_CAPS.omnisend - assigned.omnisend,
          loops: FALLBACK_CAPS.loops - assigned.loops,
        };
        const pid = Object.keys(headroom).reduce((a, b) => (headroom[a] >= headroom[b] ? a : b));
        if (headroom[pid] <= 0) break;
        const take = Math.min(remaining, headroom[pid]);
        assigned[pid] += take;
        remaining -= take;
      }
      return assigned;
    }

    function poolProviderWithHeadroom(poolAlloc) {
      const headroom = {
        mailerlite: FALLBACK_CAPS.mailerlite - (poolAlloc.mailerlite || 0),
        omnisend: FALLBACK_CAPS.omnisend - (poolAlloc.omnisend || 0),
        loops: FALLBACK_CAPS.loops - (poolAlloc.loops || 0),
      };
      const best = Object.keys(headroom).reduce((a, b) => (headroom[a] >= headroom[b] ? a : b));
      return headroom[best] > 0 ? best : "resend";
    }

    function providerContactsSim(pid, ctx, poolAlloc) {
      const alloc = poolAlloc || distributePoolOverflow(poolOverflowDemand(ctx));
      if (pid === "brevo") {
        let base = Math.min(ctx.signupVol + ctx.limitHitters, 2000);
        base += ctx.cancelledPaid;
        if (ctx.mode === "launch_week") base += Math.min(ctx.launchAudience, 500);
        return Math.min(ctx.totalUsers, base);
      }
      if (pid in FALLBACK_CAPS) {
        return alloc[pid] || 0;
      }
      if (pid === "hubspot") return ctx.companyEmailUsers + ctx.paidSubs;
      if (pid === "resend") return (alloc.resend || 0) + ctx.paidSubs + ctx.cancelledPaid;
      if (pid === "emailoctopus") {
        const conv =
          (ctx.bucketCounts.at_risk_wau || 0) +
          (ctx.bucketCounts.at_risk_mau || 0) +
          Math.min(ctx.bucketCounts.dead || 0, ctx.deadCap) +
          (ctx.bucketCounts.reactivated || 0) +
          (ctx.bucketCounts.resurrected || 0);
        return Math.min(conv, 2500);
      }
      return ctx.totalUsers;
    }

    function computeDailyPeaks(ctx) {
      const { newUsersDay, newUsersMonth, mode, launchAudience, launchDays, activationPct, agentReserve, activeRules, paidSubs, cancelledPaid, limitHitters } = ctx;
      const npsDailyPeak = Math.round((newUsersMonth / 30) * 1.5);
      const launchBrevo = mode === "launch_week" ? launchAudience / 2 / launchDays : 0;
      const peaks = {};
      peaks.brevo =
        newUsersDay +
        Math.round(newUsersDay * (1 - activationPct)) +
        npsDailyPeak +
        launchBrevo +
        agentReserve;
      const paidEvents = Math.max(paidSubs, cancelledPaid) / 30;
      peaks.resend = Math.max(paidEvents, Math.round(paidSubs * 0.05));
      peaks.hubspot = Math.max(1, Math.round(((ctx.companyEmailUsers || 0) + paidSubs) * 0.02));
      return peaks;
    }

    function computePoolAggregate(providerRows, providers) {
      const poolIds = (providers || [])
        .filter((p) => FALLBACK_PROVIDER_IDS.has(p.id) && p.status !== "deprecated")
        .map((p) => p.id);
      let sendUsed = 0;
      let sendCap = 0;
      let contactUsed = 0;
      let contactCap = 0;
      for (const row of providerRows || []) {
        if (!poolIds.includes(row.id)) continue;
        sendUsed += row.monthly || 0;
        const prov = providerById(row.id);
        const lim = prov?.free_limits || {};
        const mo = lim.marketing_emails_per_month ?? lim.emails_per_month ?? (lim.emails_per_day ? lim.emails_per_day * 30 : 0);
        if (mo) sendCap += mo;
        if (lim.contacts) {
          contactCap += lim.contacts;
          contactUsed += row.contacts || 0;
        }
      }
      return { sendUsed, sendCap, contactUsed, contactCap, providerCount: poolIds.length };
    }

    function simulateCapacity(opts) {
      const lc = emailData?.launch_config || {};
      const newUsersDay = opts.newUsersPerDayMax ?? lc.default_new_users_per_day_max ?? 7;
      const newUsersMonth = opts.newUsersPerMonthMax ?? lc.default_new_users_per_month_max ?? 200;
      const mode = opts.mode || "launch_week";
      const baseline = getBaselineState();
      const launchAudience = lc.launch_brevo_audience ?? 222;
      const launchDays = lc.launch_window_days ?? 3;
      const activationPct = lc.activation_24h_pct ?? 0.32;
      const pmfPct = lc.pmf_wau_eligible_pct ?? 0.40;
      const paidConversion = lc.paid_conversion_pct ?? 0.015;
      const agentReserve = lc.agent_brevo_daily_reserve ?? 50;

      const companyEmailPct =
        opts.companyEmailPct != null ? opts.companyEmailPct : lc.company_email_pct ?? 0.15;

      const signupVol = newUsersMonth;
      const totalUsers = baseline.totalUsers + newUsersMonth;
      const companyEmailUsers = Math.round(totalUsers * companyEmailPct);
      const autoPaid = Math.max(baseline.monetization.paid_subscribers || 0, Math.round(totalUsers * paidConversion));
      const paidSubs = opts.paidOverride != null ? opts.paidOverride : autoPaid;
      const bucketCounts = projectBucketsForSim(totalUsers, newUsersMonth);
      const rateInconsistent = newUsersDay * 30 > newUsersMonth && newUsersMonth > 0;

      let deadCap = 20;
      const activeRules = [];
      if (mode === "launch_week") activeRules.push("ph_week_brevo_primary");
      if (paidSubs >= 1) activeRules.push("paid_hubspot_sync");

      const ctx = {
        newUsersDay,
        newUsersMonth,
        mode,
        signupVol,
        totalUsers,
        companyEmailUsers,
        companyEmailPct,
        paidSubs,
        limitHitters: Math.max(baseline.monetization.users_hit_limit || 0, Math.round(newUsersMonth * 0.05)),
        cancelledPaid: baseline.monetization.cancelled_paid_subscribers || 0,
        bucketCounts,
        launchAudience,
        launchDays,
        activationPct,
        pmfPct,
        deadCap,
        activeRules,
        agentReserve,
      };

      const poolDemand = poolOverflowDemand(ctx);
      const poolAlloc = distributePoolOverflow(poolDemand);
      const brevoAutomationContacts = providerContactsSim("brevo", ctx, poolAlloc);
      const eoContacts = providerContactsSim("emailoctopus", ctx, poolAlloc);
      const poolContactsUsed =
        providerContactsSim("mailerlite", ctx, poolAlloc) +
        providerContactsSim("omnisend", ctx, poolAlloc) +
        providerContactsSim("loops", ctx, poolAlloc);

      if (poolDemand > 0 || brevoAutomationContacts >= 1600) activeRules.push("fallback_pool");
      if (brevoAutomationContacts >= 1600) activeRules.push("brevo_automation_prune_to_phase2");
      if (eoContacts >= 2000) {
        activeRules.push("emailoctopus_cap");
        ctx.deadCap = 10;
      }
      ctx.activeRules = activeRules;

      function effectiveProvider(seq) {
        let pid = seq.provider_id;
        const needsPool =
          activeRules.includes("fallback_pool") &&
          (PHASE1_SEQ_IDS.has(seq.id) ||
            PAID_SEQ_IDS.has(seq.id) ||
            seq.funnel_phase === "phase_2_conversion");
        if (needsPool) pid = poolProviderWithHeadroom(poolAlloc);
        return pid;
      }

      const byProvider = {};
      for (const seq of emailData?.sequences || []) {
        const { sends } = seqEligible(seq, ctx);
        if (sends <= 0) continue;
        let pid = effectiveProvider(seq);
        byProvider[pid] = (byProvider[pid] || 0) + sends;
        if (seq.provider_overflow_id === "fallback_pool" && activeRules.includes("fallback_pool")) {
          const spillPid = poolProviderWithHeadroom(poolAlloc);
          byProvider[spillPid] = (byProvider[spillPid] || 0) + sends * 0.15;
        }
      }

      const dailyPeaks = computeDailyPeaks(ctx);
      if (dailyPeaks.brevo > 240) activeRules.push("fallback_pool");
      if (dailyPeaks.resend > 80) activeRules.push("fallback_pool");
      if (companyEmailUsers >= 1) activeRules.push("company_email_hubspot_sync");
      ctx.activeRules = activeRules;

      const brevoProv = providerById("brevo");
      const brevoStarterLimits = brevoProv?.paid_tier?.limits || null;
      const useBrevoStarter = opts.brevoStarter === true;

      const providerRows = [];
      const failures = [];
      const priority = { launch_peak: 0, daily: 1, monthly: 2, contacts: 3 };

      for (const prov of emailData?.providers || []) {
        const pid = prov.id;
        const lim =
          pid === "brevo" && useBrevoStarter && brevoStarterLimits
            ? { ...brevoStarterLimits }
            : { ...(prov.free_limits || {}) };
        const monthly = byProvider[pid] || 0;
        const dailyAvg = monthly / 30;
        const contacts = providerContactsSim(pid, ctx, poolAlloc);
        const metrics = [];

        const moLim = lim.marketing_emails_per_month ?? lim.emails_per_month;
        if (moLim != null) {
          const pct = monthly / moLim;
          metrics.push({ key: "monthly", label: "Sends/mo", used: monthly, limit: moLim, pct });
          if (pct >= 1) failures.push({ pid, type: "monthly", used: monthly, limit: moLim, name: prov.name });
        }
        const dayLim = lim.emails_per_day;
        if (dayLim != null) {
          const peak = dailyPeaks[pid] ?? dailyAvg;
          const usePeak = dailyPeaks[pid] != null && dailyPeaks[pid] > dailyAvg;
          const dailyUsed = usePeak ? peak : dailyAvg;
          const pct = dailyUsed / dayLim;
          metrics.push({
            key: usePeak ? "launch_peak" : "daily",
            label: usePeak ? "Peak day" : "Sends/day avg",
            used: dailyUsed,
            limit: dayLim,
            pct,
          });
          if (pct >= 1) {
            failures.push({
              pid,
              type: usePeak ? "launch_peak" : "daily",
              used: dailyUsed,
              limit: dayLim,
              name: prov.name,
            });
          }
        }
        if (lim.contacts != null) {
          const pct = contacts / lim.contacts;
          metrics.push({ key: "contacts", label: "Contacts", used: contacts, limit: lim.contacts, pct });
          if (pct >= 1) failures.push({ pid, type: "contacts", used: contacts, limit: lim.contacts, name: prov.name });
        }

        const worst = metrics.reduce((a, m) => (!a || m.pct > a.pct ? m : a), null);
        const worstPct = worst ? worst.pct : 0;
        const status = worstPct >= 1 ? "at_limit" : worstPct >= 0.8 ? "near_limit" : "ok";

        providerRows.push({
          id: pid,
          name: prov.name,
          monthly,
          contacts,
          metrics,
          worst,
          status,
          barLabel: worst ? `${worst.label}: ${Math.round(worst.used).toLocaleString()} / ${worst.limit.toLocaleString()}` : "—",
        });
      }

      failures.sort((a, b) => {
        const pa = priority[a.type] ?? 9;
        const pb = priority[b.type] ?? 9;
        return pa !== pb ? pa - pb : b.used / b.limit - a.used / a.limit;
      });

      const triggeredCliffs = [];
      for (const cliff of emailData?.capacity_cliffs || []) {
        let fire = false;
        if (cliff.id === "fallback_pool_aggregate") {
          fire = poolContactsUsed > 1400;
        } else if (cliff.id === "brevo_launch_peak") {
          fire = dailyPeaks.brevo > 240;
        } else if (cliff.id === "hubspot_send_budget") {
          const hsRow = providerRows.find((p) => p.id === "hubspot");
          fire = (hsRow?.monthly || 0) > 1600;
        } else if (cliff.id === "brevo_automation_2000") {
          fire = brevoAutomationContacts >= 1600;
        } else if (cliff.id === "resend_paid_daily") {
          fire = dailyPeaks.resend > 80;
        } else if (cliff.id === "emailoctopus_2500") {
          fire = eoContacts >= 2000;
        } else if (cliff.id === "brevo_agent") {
          fire = dailyPeaks.brevo > 250;
        }
        if (fire) triggeredCliffs.push(cliff);
      }

      const goalsNote = useBrevoStarter
        ? "Brevo Starter (launch default): 20k/mo · 500k contacts — watch monthly ceiling; Loops/Resend for extreme overflow."
        : "Free Brevo (300/day · 2k automation entrants) — not recommended for PH launch; enable Starter tier above.";

      const poolAggregate = computePoolAggregate(providerRows, emailData?.providers);

      return {
        providerRows,
        firstStall: failures[0] || null,
        activeRules,
        triggeredCliffs,
        goalsNote,
        autoPaid,
        totalUsers,
        companyEmailUsers,
        companyEmailPct,
        poolAggregate,
        poolAlloc,
        poolDemand,
        newUsersDay,
        newUsersMonth,
        rateInconsistent,
        dailyPeaks,
        useBrevoStarter,
      };
    }

    function renderScenarioPlannerShell() {
      const lc = emailData?.launch_config || {};
      const presets = emailData?.scenario_presets || [];
      const audience = lc.launch_brevo_audience ?? 222;
      const dayMax = lc.slider_day_max ?? 1000;
      const monthMax = lc.slider_month_max ?? 3000;
      const dayDefault = lc.default_new_users_per_day_max ?? 7;
      const monthDefault = lc.default_new_users_per_month_max ?? 200;
      const starterDefault = lc.brevo_starter_default !== false;
      const presetBtns = presets
        .map(
          (p) =>
            `<button type="button" class="scenario-preset-btn" data-day="${p.new_users_per_day_max ?? 0}" data-month="${p.new_users_per_month_max ?? 0}" data-mode="${escapeHtml(p.mode)}" data-paid="${p.paid_override ?? ""}">${escapeHtml(p.label)}</button>`
        )
        .join("");
      return `<section id="capacity-scenarios">
        <h2>PH scenario planner</h2>
        <p class="section-cap">Stress-test signup volume against provider caps. <strong>Launch planning defaults to Brevo Starter</strong> ($29/mo) — see <a href="#launch-brevo">Launch plan</a>. Launch audience: <strong>${audience}</strong> Brevo recipients (175 waitlist + 47 internal).</p>
        <div class="scenario-controls">
          <div class="scenario-control-group">
            <label for="scenario-day-max">New users / day (max)</label>
            <input type="range" id="scenario-day-max" min="0" max="${dayMax}" step="1" value="${dayDefault}" />
            <input type="number" id="scenario-day-max-num" min="0" max="${dayMax}" step="1" value="${dayDefault}" />
          </div>
          <div class="scenario-control-group">
            <label for="scenario-month-max">New users / month (max)</label>
            <input type="range" id="scenario-month-max" min="0" max="${monthMax}" step="10" value="${monthDefault}" />
            <input type="number" id="scenario-month-max-num" min="0" max="${monthMax}" step="1" value="${monthDefault}" />
          </div>
          <div class="scenario-control-group">
            <label for="scenario-company-pct">Company email % <span class="section-cap">(non-consumer domains → HubSpot)</span></label>
            <input type="range" id="scenario-company-pct" min="0" max="50" step="1" value="${Math.round((lc.company_email_pct ?? 0.15) * 100)}" />
            <input type="number" id="scenario-company-pct-num" min="0" max="50" step="1" value="${Math.round((lc.company_email_pct ?? 0.15) * 100)}" />
          </div>
          <div class="scenario-control-group">
            <label>Brevo tier</label>
            <label class="scenario-override-toggle"><input type="checkbox" id="scenario-brevo-starter"${starterDefault ? " checked" : ""} /> Starter ($29/mo · 20k sends · 500k contacts) — <strong>launch default</strong></label>
            <p class="section-cap">Uncheck to model free tier (300/day · 2k automation entrants) — not recommended for Product Hunt week.</p>
          </div>
          <div class="scenario-control-group">
            <label for="scenario-paid">Paid subscribers <span id="scenario-paid-mode" class="section-cap">(auto)</span></label>
            <input type="range" id="scenario-paid" min="0" max="500" step="5" value="0" />
            <input type="number" id="scenario-paid-num" min="0" max="500" step="1" value="0" />
            <label class="scenario-override-toggle"><input type="checkbox" id="scenario-paid-override" /> Override auto</label>
          </div>
          <div class="scenario-control-group">
            <label>Mode</label>
            <label><input type="radio" name="scenario-mode" value="launch_week" checked /> Launch week</label>
            <label><input type="radio" name="scenario-mode" value="steady_month" /> Steady month</label>
          </div>
          <div class="scenario-presets">${presetBtns}</div>
        </div>
        <div id="scenario-summary"></div>
        <div id="scenario-provider-cards" class="capacity-kpi-row"></div>
      </section>`;
    }

    function updateScenarioUI() {
      const dayEl = document.getElementById("scenario-day-max");
      const paidOverrideCb = document.getElementById("scenario-paid-override");
      if (!dayEl) return;

      const newUsersDay = Number(document.getElementById("scenario-day-max-num")?.value || dayEl.value);
      const newUsersMonth = Number(document.getElementById("scenario-month-max-num")?.value || document.getElementById("scenario-month-max")?.value);
      const mode = document.querySelector('input[name="scenario-mode"]:checked')?.value || "launch_week";
      const paidOverrideOn = paidOverrideCb?.checked;
      const paidVal = Number(document.getElementById("scenario-paid-num")?.value || 0);
      const brevoStarterOn = document.getElementById("scenario-brevo-starter")?.checked ?? false;
      const companyPctVal = Number(document.getElementById("scenario-company-pct-num")?.value || 15);
      const sim = simulateCapacity({
        newUsersPerDayMax: newUsersDay,
        newUsersPerMonthMax: newUsersMonth,
        mode,
        paidOverride: paidOverrideOn ? paidVal : null,
        brevoStarter: brevoStarterOn,
        companyEmailPct: companyPctVal / 100,
      });

      const modeEl = document.getElementById("scenario-paid-mode");
      if (modeEl) modeEl.textContent = paidOverrideOn ? "(override)" : `(auto: ${sim.autoPaid})`;

      if (!paidOverrideOn) {
        const paidSlider = document.getElementById("scenario-paid");
        const paidNum = document.getElementById("scenario-paid-num");
        if (paidSlider) paidSlider.value = sim.autoPaid;
        if (paidNum) paidNum.value = sim.autoPaid;
      }

      const summaryEl = document.getElementById("scenario-summary");
      if (summaryEl) {
        const stall = sim.firstStall;
        const rateWarn = sim.rateInconsistent
          ? `<div class="banner banner-info">Daily max × 30 (${(newUsersDay * 30).toLocaleString()}) exceeds monthly max (${newUsersMonth.toLocaleString()}) — peak-day stress uses daily; volume uses monthly.</div>`
          : "";
        const stallBanner = stall

    function bindScenarioPlanner() {
      const syncPair = (rangeId, numId) => {
        const range = document.getElementById(rangeId);
        const num = document.getElementById(numId);
        if (!range || !num) return;
        range.addEventListener("input", () => {
          num.value = range.value;
          updateScenarioUI();
        });
        num.addEventListener("input", () => {
          range.value = num.value;
          updateScenarioUI();
        });
      };
      syncPair("scenario-day-max", "scenario-day-max-num");
      syncPair("scenario-month-max", "scenario-month-max-num");
      syncPair("scenario-paid", "scenario-paid-num");
      syncPair("scenario-company-pct", "scenario-company-pct-num");

      document.getElementById("scenario-paid-override")?.addEventListener("change", updateScenarioUI);
      document.getElementById("scenario-brevo-starter")?.addEventListener("change", updateScenarioUI);
      document.querySelectorAll('input[name="scenario-mode"]').forEach((el) => {
        el.addEventListener("change", updateScenarioUI);
      });

      document.querySelectorAll(".scenario-preset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const day = Number(btn.getAttribute("data-day"));
          const month = Number(btn.getAttribute("data-month"));
          const mode = btn.getAttribute("data-mode");
          const paid = btn.getAttribute("data-paid");
          document.getElementById("scenario-day-max").value = day;
          document.getElementById("scenario-day-max-num").value = day;
          document.getElementById("scenario-month-max").value = month;
          document.getElementById("scenario-month-max-num").value = month;
          if (mode) {
            const radio = document.querySelector(`input[name="scenario-mode"][value="${mode}"]`);
            if (radio) radio.checked = true;
          }
          const overrideCb = document.getElementById("scenario-paid-override");
          if (paid !== "" && paid != null) {
            if (overrideCb) overrideCb.checked = true;
            document.getElementById("scenario-paid").value = paid;
            document.getElementById("scenario-paid-num").value = paid;
          } else if (overrideCb) {
            overrideCb.checked = false;
          }
          updateScenarioUI();
        });
      });

      updateScenarioUI();
    }
