      const buckets = [
        ...(emailData?.buckets || []).map((b) => [b.key, b.label]),
        ...(emailData?.pseudo_buckets || []).map((b) => [b.key, b.label]),
      ];
      return `<div class="filter-bar">
        <label>Bucket <select id="filter-bucket"><option value="">All</option>${buckets.map(([k, l]) => `<option value="${escapeHtml(k)}">${escapeHtml(l)}</option>`).join("")}</select></label>
        <label>Provider <select id="filter-provider"><option value="">All</option>${providers.map((p) => `<option value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</option>`).join("")}</select></label>
        <label>Funnel phase <select id="filter-funnel-phase"><option value="">All</option>${funnelPhases.map((fp) => `<option value="${escapeHtml(fp)}">${escapeHtml(FUNNEL_PHASE_LABELS[fp] || fp)}</option>`).join("")}</select></label>
        <label>Routing <select id="filter-routing"><option value="">All</option><option value="has-fallback">Has fallback</option><option value="primary-only">Primary only</option><option value="ph-interim">PH interim</option></select></label>
        <label>Template <select id="filter-template"><option value="">All</option><option value="has-preview">Has template</option><option value="missing-template">Missing template</option></select></label>
        <span id="filter-count" class="section-cap"></span>
      </div>`;
    }

    function applyFilters() {
      const bucket = document.getElementById("filter-bucket")?.value || "";
      const provider = document.getElementById("filter-provider")?.value || "";
      const funnelPhase = document.getElementById("filter-funnel-phase")?.value || "";
      const routing = document.getElementById("filter-routing")?.value || "";
      const templateFilter = document.getElementById("filter-template")?.value || "";
      const poolIds = new Set(emailData?.fallback_pool?.provider_ids || []);
      const rows = document.querySelectorAll(".touch-row, .seq-row");
      let visible = 0;
      rows.forEach((row) => {
        const buckets = (row.getAttribute("data-bucket") || "").split(",");
        const matchBucket = !bucket || buckets.includes(bucket);
        const rowProvider = row.getAttribute("data-provider") || "";
        const rowOverflow = row.getAttribute("data-overflow") || "";
        const matchProvider =
          !provider ||
          rowProvider === provider ||
          rowOverflow === provider ||
          (rowOverflow === "fallback_pool" && poolIds.has(provider));
        const matchFunnelPhase = !funnelPhase || row.getAttribute("data-funnel-phase") === funnelPhase;
        const hasFallback = row.getAttribute("data-has-fallback") === "1";
        const phInterim = row.getAttribute("data-ph-interim") === "1";
        const hasPreview = row.getAttribute("data-has-preview") === "1";
        const matchRouting =
          !routing ||
          (routing === "has-fallback" && hasFallback) ||
          (routing === "primary-only" && !hasFallback) ||
          (routing === "ph-interim" && phInterim);
        const matchTemplate =
          !templateFilter ||
          (templateFilter === "has-preview" && hasPreview) ||
          (templateFilter === "missing-template" && !hasPreview);
        const show = matchBucket && matchProvider && matchFunnelPhase && matchRouting && matchTemplate;
        row.classList.toggle("hidden", !show);
        if (show) visible++;
      });
      const el = document.getElementById("filter-count");
      if (el) el.textContent = `Showing ${visible} of ${rows.length} email touches`;
    }

    function bindFilters() {
      ["filter-bucket", "filter-provider", "filter-funnel-phase", "filter-routing", "filter-template"].forEach((id) => {
        document.getElementById(id)?.addEventListener("change", applyFilters);
      });
      applyFilters();
    }

    function liveBanner() {
      if (!snapshotData) {
        return `<div class="banner banner-info">Live bucket counts unavailable — showing static reference only. Open on Vercel or run <span class="code">vercel dev</span> for live cohort sizes.</div>`;
      }
      const dau = snapshotData.dau_model || {};
      const asOf = dau.as_of || snapshotData.snapshot_date || "—";
      const totals = dau.totals || {};
      return `<div class="banner banner-live">Live cohorts as of ${escapeHtml(asOf)} · DAU ${totals.dau ?? "—"} · WAU ${totals.wau ?? "—"} · MAU ${totals.mau ?? "—"} · <a href="/">Dashboard</a></div>`;
    }

    function renderPage() {
      const app = document.getElementById("app");
      const implStats = sequenceImplementationStats();
      const cc = emailData?.launch_config?.conversion_config || {};
      app.innerHTML = `
        <nav class="site-nav">
          <a href="/">Dashboard</a>
          <a href="/email-machine" aria-current="page">Email machine</a>
        </nav>
        <h1>User Email Machine</h1>
        <p class="caption">Engineer implementation guide — multi-provider lifecycle email. Spec: <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/docs/USER_EMAIL_MACHINE_PROPOSAL.md">USER_EMAIL_MACHINE_PROPOSAL.md</a> · Agent: <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/PLAN.md">PLAN.md</a></p>
        ${liveBanner()}
        ${renderCharterNav()}
        ${renderBrevoLaunchPlan()}
        ${renderSupabaseLifecyclePlan()}
        <section id="overview">
          <h2>Overview</h2>
          <p class="section-cap">Goals: <strong>500 paid subscribers by Dec 31, 2026</strong>, <strong>4.5× DAU</strong> vs Product Hunt launch week, <strong>80% gross margin</strong>. Lifecycle email budget: <strong>${cc.phase_1_emails_min ?? 4}–${cc.phase_1_emails_max ?? 7}</strong> Phase 1 + <strong>${cc.phase_2_conversion_emails_min ?? 3}–${cc.phase_2_conversion_emails_max ?? 4}</strong> Phase 2 conversion = <strong>${cc.total_emails_before_perpetual_free_min ?? 7}–${cc.total_emails_before_perpetual_free_max ?? 11}</strong> total before perpetual free.</p>
          <p class="section-cap">Three-phase funnel + redundant fallback pool — see <a href="#funnel">Funnel architecture</a>, <a href="#supabase-lifecycle">Supabase lifecycle plan</a> (recommended Phase 1 triggers), and <a href="#implementation">Implementation guide</a>.</p>
          <div class="info">
            <ul style="margin:0;padding-left:1.25rem">
              <li><strong>Supabase lifecycle plan</strong> — Edge Functions + cron trigger spec, checklist, Brevo template mapping</li>
              <li><strong>Sequence table</strong> — funnel phase, provider routing, Supabase trigger spec, dedup keys</li>
              <li><strong>Routing rules</strong> — what fires when a cap hits (including fallback pool)</li>
              <li><strong>Scenario planner</strong> — stress-test signup volume against free-tier limits</li>
              <li><strong>Near limit</strong> — alert at 80% of contacts/sends (<span class="code">email_provider_capacity</span> in snapshot)</li>
            </ul>
          </div>
        </section>
        ${renderFunnelArchitecture()}
        ${renderImplementationGuide()}
        <section id="sequences">
          <h2>Email inventory</h2>
          <p class="section-cap">One row per email touch — primary provider and fallback routing when primary hits cap. Filter by funnel phase, provider, or routing. <strong>${implStats.shipped} of ${implStats.total} sequences shipped</strong> · ${implStats.pending} need implementation.</p>
          ${renderFilters()}
          ${renderEmailInventory()}
        </section>
        ${renderRoutingRules()}
        <section id="buckets">
          <h2>DAU buckets</h2>
          <p class="section-cap">Classified daily from sessions ∪ llm_usage · same logic as <span class="code">reporting/dau_model.py</span></p>
          ${renderBucketsTable()}
        </section>
        ${renderScenarioPlannerShell()}
        ${renderProviderCapacity()}
        <section id="capacity">
          <h2>Capacity cliffs</h2>
          <p class="section-cap">When free tiers break — simulation-backed triggers. Use <a href="#capacity-scenarios">scenario planner</a> to test signup volume.</p>
          ${renderCliffsTable()}
        </section>
        ${renderProviderSetup()}
        <section id="providers">
          <h2>Email providers (free tier)</h2>
          <p class="section-cap"><strong>Phase 1</strong> Brevo (<a href="#launch-brevo">Starter $29/mo</a>) · <strong>Phase 2 paid</strong> Resend + HubSpot · <strong>Operational</strong> SES → <strong>Resend Pro</strong> ($20/mo) until SES production · <strong>Fallback pool</strong> = ${escapeHtml(fallbackPoolMemberLabel())}. See <a href="#provider-setup">account setup</a>.</p>
          ${renderProvidersGrouped()}
          ${renderProviderCandidates()}
        </section>
        ${renderPreviewGallery()}
        <section id="ops">
          <h2>Operational loop</h2>
          <div class="info">
            <ol style="margin:0;padding-left:1.25rem">
              <li><span class="code">main.py --baseline</span> → snapshot with <span class="code">dau_model</span> + bucket classification</li>
              <li>Read <span class="code">email_funnel_status</span> + <span class="code">lifecycle_emails_sent</span> per user</li>
              <li>Evaluate sequence triggers for user's funnel phase</li>
              <li>Route send to primary provider or fallback pool member with most headroom; if fallback fires, queue phase migration or provider upgrade review</li>
              <li>Log to <span class="code">outreach_log</span> via <span class="code">dedup_trigger_name</span>; on phase exit update Supabase + provider list prune</li>
            </ol>
          </div>
        </section>
        <footer>
          ${implStats.shipped} of ${implStats.total} sequences shipped · ${implStats.pending} pending implementation ·
          <a href="https://github.com/AdamKershner/oasis-analytics/blob/main/PLAN.md">CS agent PLAN.md</a> ·
          <a href="/">← Dashboard</a>
        </footer>
      `;
      bindFilters();
      bindCopyButtons();
      bindPreviewModal();
      bindScenarioPlanner();
    }

    async function loadCopyManifest() {
      try {
        const res = await fetch("/emails/copy_manifest.json", { cache: "no-store" });
        if (!res.ok) throw new Error("missing");
        copyManifest = await res.json();
      } catch {
        copyManifest = {};
      }
    }

    async function loadSnapshot() {
      try {
        const res = await fetch("/api/snapshot", { cache: "no-store" });
        if (!res.ok) throw new Error(`API ${res.status}`);
        snapshotData = await res.json();
        bucketCounts = snapshotData?.dau_model?.bucket_counts || {};
      } catch {
        snapshotData = null;
        bucketCounts = {};
      }
    }

    async function init() {
      try {
        const res = await fetch("/email_sequences.json", { cache: "no-store" });
        if (!res.ok) throw new Error("email_sequences.json missing");
        emailData = await res.json();
        await loadSnapshot();
        await loadCopyManifest();
        renderPage();
      } catch (e) {
        document.getElementById("app").innerHTML = `<p class="err">Failed to load: ${escapeHtml(e.message)}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
